<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, push, update, remove, onValue, off, query, orderByChild, limitToLast }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// =====================================================
// 🔧 CONFIGURAÇÃO — substitua pelos seus valores reais
// =====================================================
const FIREBASE_CONFIG = {
  apiKey:            "SUA_API_KEY",
  authDomain:        "SEU_PROJECT.firebaseapp.com",
  databaseURL:       "https://SEU_PROJECT-default-rtdb.firebaseio.com",
  projectId:         "SEU_PROJECT",
  storageBucket:     "SEU_PROJECT.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId:             "SEU_APP_ID"
};

// Cloudinary — upload sem assinatura (unsigned preset)
const CLOUDINARY_CLOUD = "SEU_CLOUD_NAME";
const CLOUDINARY_PRESET = "bubble_unsigned"; // crie um unsigned upload preset no Cloudinary

// =====================================================
// GhiTube bridge — domínio onde o GhiTube roda
// Deixe vazio ("") para desabilitar o bridge
// =====================================================
const GHITUBE_ORIGIN = "https://SEU_GHITUBE.dominio.com";

// =====================================================

const firebaseApp = initializeApp(FIREBASE_CONFIG);
const auth        = getAuth(firebaseApp);
const rtdb        = getDatabase(firebaseApp);

// ---------- helpers rtdb ----------
const dbRef  = (path)          => ref(rtdb, path);
const dbSet  = (path, val)     => set(dbRef(path), val);
const dbGet  = (path)          => get(dbRef(path)).then(s => s.val());
const dbPush = (path, val)     => push(dbRef(path), val);
const dbUpd  = (path, val)     => update(dbRef(path), val);
const dbDel  = (path)          => remove(dbRef(path));
const dbListen = (path, cb)    => { onValue(dbRef(path), s => cb(s.val())); return ()=>off(dbRef(path)); };

// =====================================================
// Cloudinary upload — retorna URL pública comprimida
// =====================================================
async function uploadToCloudinary(file) {
  if (!file) return null;
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  // transformação automática: max 1200px, qualidade auto, formato webp
  fd.append("transformation", "w_1200,h_1200,c_limit,q_auto,f_webp");
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: "POST", body: fd
  });
  if (!res.ok) throw new Error("Cloudinary upload falhou");
  const data = await res.json();
  // URL comprimida via parâmetros Cloudinary
  return data.secure_url.replace("/upload/", "/upload/w_1200,q_auto,f_webp/");
}

// =====================================================
// GhiTube Bridge
// Permite que o GhiTube embeds apareçam no feed
// e que a Bubble envie eventos para o GhiTube
// =====================================================
function setupGhiTubeBridge() {
  if (!GHITUBE_ORIGIN) return;
  window.addEventListener("message", (e) => {
    if (e.origin !== GHITUBE_ORIGIN) return;
    const { type, payload } = e.data || {};
    if (type === "GHITUBE_VIDEO_SHARED") {
      // GhiTube enviou um vídeo para ser postado na Bubble
      handleGhiTubeShare(payload);
    }
    if (type === "GHITUBE_USER_SYNC") {
      // GhiTube solicitou sync de usuário logado
      if (window._bubbleCurrentUser) {
        e.source.postMessage({
          type: "BUBBLE_USER",
          payload: {
            uid:      window._bubbleCurrentUser.uid,
            username: window._bubbleCurrentUser.username,
            avatar:   window._bubbleCurrentUser.avatar
          }
        }, GHITUBE_ORIGIN);
      }
    }
  });
}

function postGhiTubeEvent(type, payload) {
  if (!GHITUBE_ORIGIN) return;
  const frames = document.querySelectorAll("iframe[data-ghitube]");
  frames.forEach(f => f.contentWindow?.postMessage({ type, payload }, GHITUBE_ORIGIN));
  // também tenta a janela pai (caso Bubble rode dentro do GhiTube)
  if (window.parent !== window) {
    window.parent.postMessage({ type, payload }, GHITUBE_ORIGIN);
  }
}

async function handleGhiTubeShare(payload) {
  // payload: { videoId, title, thumbnail, url, authorGhiTube }
  if (!window._bubbleCurrentUser) return;
  const content = `📺 ${payload.title}\n${payload.url}\n#GhiTube #Video`;
  await createPost(content, payload.thumbnail || "", "public", "");
  toast("Vídeo do GhiTube compartilhado!");
}

// =====================================================
// DB helpers — contas e posts no Firebase
// =====================================================

// --- USERS ---
async function fbCreateUser(uid, data) {
  await dbSet(`users/${uid}`, { ...data, createdAt: Date.now() });
}
async function fbGetUser(uid) {
  return await dbGet(`users/${uid}`);
}
async function fbUpdateUser(uid, data) {
  await dbUpd(`users/${uid}`, data);
}
async function fbListUsers() {
  const all = await dbGet("users");
  return all ? Object.entries(all).map(([uid, v]) => ({ uid, ...v })) : [];
}

// --- POSTS ---
async function fbCreatePost(postData) {
  const ref2 = await dbPush("posts", { ...postData, createdAt: Date.now() });
  return ref2.key;
}
async function fbDeletePost(postId) {
  await dbDel(`posts/${postId}`);
  // remove likes e comentários associados
  const likes = await dbGet("likes");
  if (likes) {
    for (const [k, v] of Object.entries(likes)) {
      if (v.postId === postId) await dbDel(`likes/${k}`);
    }
  }
  const comments = await dbGet("comments");
  if (comments) {
    for (const [k, v] of Object.entries(comments)) {
      if (v.postId === postId) await dbDel(`comments/${k}`);
    }
  }
}
async function fbEditPost(postId, data) {
  await dbUpd(`posts/${postId}`, { ...data, edited: true });
}

// --- LIKES ---
async function fbToggleLike(postId, uid) {
  const existing = await dbGet("likes");
  const found = existing
    ? Object.entries(existing).find(([, v]) => v.postId === postId && v.userId === uid)
    : null;
  if (found) {
    await dbDel(`likes/${found[0]}`);
    return false;
  } else {
    await dbPush("likes", { postId, userId: uid, ts: Date.now() });
    return true;
  }
}

// --- COMMENTS ---
async function fbAddComment(postId, uid, content) {
  await dbPush("comments", { postId, authorId: uid, content, ts: Date.now() });
}

// --- NOTIFICATIONS ---
async function fbCreateNotification(toUid, type, fromUid, postId) {
  if (toUid === fromUid) return;
  await dbPush(`notifications/${toUid}`, { type, fromUserId: fromUid, postId, read: false, ts: Date.now() });
}
async function fbMarkNotifsRead(uid) {
  const notifs = await dbGet(`notifications/${uid}`);
  if (!notifs) return;
  const updates = {};
  for (const k of Object.keys(notifs)) updates[`notifications/${uid}/${k}/read`] = true;
  await dbUpd("", updates);
}

// --- MESSAGES ---
async function fbSendMessage(convId, senderId, content) {
  await dbPush(`messages/${convId}`, { senderId, content, ts: Date.now() });
  await dbUpd(`conversations/${convId}`, { lastUpdated: Date.now() });
}
async function fbGetOrCreateConv(uid1, uid2) {
  const convs = await dbGet("conversations");
  if (convs) {
    for (const [k, v] of Object.entries(convs)) {
      if (v.participants && v.participants[uid1] && v.participants[uid2]) return k;
    }
  }
  const ref2 = await dbPush("conversations", {
    participants: { [uid1]: true, [uid2]: true },
    lastUpdated: Date.now()
  });
  return ref2.key;
}

// =====================================================
// APP STATE
// =====================================================
let currentUser   = null;   // { uid, username, avatar, bio, role, isNPC, following, followers }
let currentView   = "feed";
let activeConvId  = null;
let profileViewId = null;
let openOptionsPostId = null;

// local cache (atualizado pelos listeners)
let _posts         = {};  // { id: postObj }
let _users         = {};  // { uid: userObj }
let _likes         = {};  // { id: likeObj }
let _comments      = {};  // { id: commentObj }
let _notifications = {};  // { id: notifObj }
let _convs         = {};  // { id: convObj }
let _messages      = {};  // { convId: { msgId: msg } }

// listeners ativos
const _unsubs = [];

function startListeners() {
  _unsubs.push(dbListen("posts",         v => { _posts         = v || {}; renderIfNeeded(); }));
  _unsubs.push(dbListen("users",         v => { _users         = v || {}; renderIfNeeded(); }));
  _unsubs.push(dbListen("likes",         v => { _likes         = v || {}; renderIfNeeded(); }));
  _unsubs.push(dbListen("comments",      v => { _comments      = v || {}; renderIfNeeded(); }));
  _unsubs.push(dbListen(`notifications/${currentUser.uid}`, v => { _notifications = v || {}; renderIfNeeded(); }));
  _unsubs.push(dbListen("conversations", v => { _convs         = v || {}; renderIfNeeded(); }));
}
function stopListeners() {
  _unsubs.forEach(fn => typeof fn === "function" && fn());
  _unsubs.length = 0;
}

let _renderPending = false;
function renderIfNeeded() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => { _renderPending = false; render(); });
}

// =====================================================
// HELPERS
// =====================================================
const AVATARS = ['✨','👾','🤖','🧬','🦾','👁️','🌀','💎','🔮','🧿','🌐','⚡','🫧','🎮','🕹️','🔥','🌙','🐉'];

function getUserById(uid)    { return uid ? { uid, ...((_users[uid]) || {}) } : null; }
function postsArray()        { return Object.entries(_posts).map(([id,v])=>({id,...v})).sort((a,b)=>b.createdAt-a.createdAt); }
function commentsByPost(pid) { return Object.entries(_comments).map(([id,v])=>({id,...v})).filter(c=>c.postId===pid).sort((a,b)=>a.ts-b.ts); }
function likesByPost(pid)    { return Object.values(_likes).filter(l=>l.postId===pid); }
function userLiked(uid,pid)  { return Object.values(_likes).some(l=>l.userId===uid&&l.postId===pid); }
function notifsArray()       { return Object.entries(_notifications).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts); }
function unreadCount()       { return notifsArray().filter(n=>!n.read).length; }
function myConvs()           {
  return Object.entries(_convs)
    .map(([id,v])=>({id,...v}))
    .filter(c=>c.participants&&c.participants[currentUser.uid])
    .sort((a,b)=>b.lastUpdated-a.lastUpdated);
}
function getTrendingHashtags() {
  const freq = new Map();
  postsArray().forEach(p=>{
    (p.content?.match(/#[\wÀ-ÿ]+/g)||[]).forEach(t=>freq.set(t,(freq.get(t)||0)+1));
  });
  return Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).slice(0,8);
}
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'agora';
  const m = Math.floor(s/60); if (m<60) return m+'min';
  const h = Math.floor(m/60); if (h<24) return h+'h';
  const d = Math.floor(h/24); if (d<30) return d+'d';
  return Math.floor(d/30)+'m';
}
function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorHashtags(txt) { return esc(txt).replace(/#([\wÀ-ÿ]+)/g,'<span class="hashtag">#$1</span>'); }
function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' toast-'+type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function showLoading(msg='Carregando...') {
  let el = document.getElementById('globalLoader');
  if (!el) { el = document.createElement('div'); el.id='globalLoader'; el.className='global-loader'; document.body.appendChild(el); }
  el.textContent = msg; el.style.display='block';
}
function hideLoading() { const el=document.getElementById('globalLoader'); if(el) el.style.display='none'; }

// =====================================================
// AUTH
// =====================================================
async function login(email, pass) {
  showLoading('Conectando...');
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const udata = await fbGetUser(cred.user.uid);
    if (!udata) throw new Error("Perfil não encontrado");
    currentUser = { uid: cred.user.uid, ...udata };
    window._bubbleCurrentUser = currentUser;
    hideLoading();
    startListeners();
    currentView = 'feed';
    render();
    postGhiTubeEvent("BUBBLE_LOGIN", { uid: currentUser.uid, username: currentUser.username });
    return true;
  } catch(e) {
    hideLoading();
    return e.message;
  }
}

async function register(username, email, pass) {
  if (!username||!email||!pass) return 'fill';
  showLoading('Criando conta...');
  try {
    // check username único
    const all = await fbListUsers();
    if (all.some(u=>u.username===username)) { hideLoading(); return 'exists'; }
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const udata = { username, email, bio:'', avatar:'✨', role:'user', isNPC:false, followers:{}, following:{} };
    await fbCreateUser(cred.user.uid, udata);
    currentUser = { uid: cred.user.uid, ...udata };
    window._bubbleCurrentUser = currentUser;
    hideLoading();
    startListeners();
    currentView = 'feed';
    render();
    return 'ok';
  } catch(e) {
    hideLoading();
    return e.message;
  }
}

async function logout() {
  stopListeners();
  await signOut(auth);
  currentUser = null;
  window._bubbleCurrentUser = null;
  currentView = 'feed';
  _posts={}; _users={}; _likes={}; _comments={}; _notifications={}; _convs={}; _messages={};
  render();
}

// =====================================================
// ACTIONS
// =====================================================

async function createPost(content, imageUrl='', visibility='public', hiddenContent='') {
  if (!currentUser || !content.trim()) return;
  showLoading('Publicando...');
  try {
    await fbCreatePost({
      authorId: currentUser.uid,
      content: content.trim(),
      imageUrl: imageUrl||'',
      visibility,
      hiddenContent: hiddenContent||null,
      isEvent: false,
      edited: false,
      timestamp: new Date().toISOString()
    });
    closeModal();
    currentView = 'feed';
    toast('Post publicado!');
  } catch(e) { toast('Erro: '+e.message,'err'); }
  hideLoading();
}

async function deletePost(pid) {
  const p = _posts[pid];
  if (!p || (currentUser.role!=='admin' && p.authorId!==currentUser.uid)) return;
  await fbDeletePost(pid);
  openOptionsPostId = null;
  toast('Post removido.');
}

async function editPost(pid, newContent, newImg, newHidden) {
  const p = _posts[pid];
  if (!p || (currentUser.role!=='admin' && p.authorId!==currentUser.uid)) return;
  const upd = {};
  if (newContent) upd.content = newContent;
  if (newImg !== undefined) upd.imageUrl = newImg;
  if (newHidden !== undefined) upd.hiddenContent = newHidden||null;
  await fbEditPost(pid, upd);
  closeModal();
  toast('Post editado.');
}

async function toggleLike(pid) {
  if (!currentUser) return;
  const added = await fbToggleLike(pid, currentUser.uid);
  if (added) {
    const post = _posts[pid];
    if (post && post.authorId !== currentUser.uid)
      await fbCreateNotification(post.authorId, 'like', currentUser.uid, pid);
  }
}

async function addComment(pid, text) {
  if (!currentUser || !text.trim()) return;
  await fbAddComment(pid, currentUser.uid, text.trim());
  const post = _posts[pid];
  if (post && post.authorId !== currentUser.uid)
    await fbCreateNotification(post.authorId, 'comment', currentUser.uid, pid);
}

async function followUser(targetUid) {
  if (!currentUser || currentUser.uid===targetUid) return;
  const isF = _users[currentUser.uid]?.following?.[targetUid];
  if (isF) {
    await dbDel(`users/${currentUser.uid}/following/${targetUid}`);
    await dbDel(`users/${targetUid}/followers/${currentUser.uid}`);
    toast('Deixou de seguir.');
  } else {
    await dbSet(`users/${currentUser.uid}/following/${targetUid}`, true);
    await dbSet(`users/${targetUid}/followers/${currentUser.uid}`, true);
    toast('Seguindo!');
  }
  currentUser = { uid: currentUser.uid, ...(await fbGetUser(currentUser.uid)) };
}

async function sendMessage(receiverUid, content) {
  if (!currentUser || !content.trim()) return;
  const convId = await fbGetOrCreateConv(currentUser.uid, receiverUid);
  activeConvId = convId;
  await fbSendMessage(convId, currentUser.uid, content.trim());
  // sub to messages of this conv if not already
  if (!_messages[convId]) {
    _messages[convId] = {};
    _unsubs.push(dbListen(`messages/${convId}`, v => { _messages[convId]=v||{}; renderIfNeeded(); }));
  }
}

async function startConvWithUser(targetUid) {
  const convId = await fbGetOrCreateConv(currentUser.uid, targetUid);
  activeConvId = convId;
  currentView = 'messages';
  if (!_messages[convId]) {
    _messages[convId] = {};
    _unsubs.push(dbListen(`messages/${convId}`, v => { _messages[convId]=v||{}; renderIfNeeded(); }));
  }
  render();
}

// Cloudinary image upload
async function handleImageUpload(file, onSuccess) {
  if (!file) return;
  toast('Enviando imagem...');
  try {
    const url = await uploadToCloudinary(file);
    onSuccess(url);
    toast('Imagem carregada!');
  } catch(e) {
    toast('Erro no upload: '+e.message, 'err');
  }
}

// NPC / Admin
async function createNPC(username, email, password, bio) {
  if (!currentUser || currentUser.role!=='admin' || !username||!email||!password) return false;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await fbCreateUser(cred.user.uid, {
      username, email, bio:bio||'NPC do sistema.',
      avatar:'🧬', role:'user', isNPC:true, followers:{}, following:{}
    });
    return true;
  } catch(e) { toast(e.message,'err'); return false; }
}

async function createSystemPost(content) {
  if (currentUser?.role !== 'admin' || !content) return;
  await fbCreatePost({
    authorId: currentUser.uid,
    content: `⚡ SISTEMA: ${content}`,
    imageUrl:'', visibility:'public', hiddenContent:null,
    isEvent:true, edited:false, timestamp: new Date().toISOString()
  });
  currentView='feed'; toast('Post do sistema criado!');
}

async function adminEditPost(pid, newContent, newImg, newTs, newHidden) {
  const upd = {};
  if (newContent) upd.content=newContent;
  if (newImg!==undefined) upd.imageUrl=newImg;
  if (newTs) upd.timestamp=newTs;
  if (newHidden!==undefined) upd.hiddenContent=newHidden||null;
  upd.edited=true;
  await fbEditPost(pid, upd);
  toast('Post editado!');
}

// =====================================================
// RENDER
// =====================================================
function render() {
  const app = document.getElementById('app');
  if (!currentUser) { app.innerHTML = renderLogin(); attachLoginEvents(); return; }
  app.innerHTML = renderHeader() + renderBottomNav() + renderMain();
  attachMainEvents();
  if (currentView==='messages' && activeConvId) {
    const cm = document.getElementById('chatMessages');
    if (cm) cm.scrollTop = cm.scrollHeight;
  }
}

function renderHeader() {
  const uc = unreadCount();
  return `<div class="header">
    <div class="logo">Bubble</div>
    <div class="header-right">
      <button class="icon-btn" id="hdr-notif"><i class="far fa-bell"></i>${uc?`<span class="badge">${uc}</span>`:''}</button>
      <button class="icon-btn" id="hdr-msg"><i class="far fa-paper-plane"></i></button>
      <button class="icon-btn" id="hdr-logout" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>`;
}

function renderBottomNav() {
  const v = currentView;
  return `<div class="bottom-nav">
    <button class="nav-btn ${v==='feed'?'active':''}" data-nav="feed"><i class="fas fa-home"></i></button>
    <button class="nav-btn ${v==='search'?'active':''}" data-nav="search"><i class="fas fa-search"></i></button>
    <button class="nav-btn ${v==='trending'?'active':''}" data-nav="trending"><i class="fas fa-fire"></i></button>
    <button class="nav-btn" id="nav-newpost"><i class="fas fa-plus-circle"></i></button>
    <button class="nav-btn ${v==='profile'?'active':''}" data-nav="profile"><i class="fas fa-user"></i></button>
    ${currentUser.role==='admin'?`<button class="nav-btn skull ${v==='admin'?'active':''}" data-nav="admin"><i class="fas fa-skull"></i></button>`:''}
  </div>`;
}

function renderMain() {
  if (currentView==='feed')          return renderFeed();
  if (currentView==='search')        return renderSearch();
  if (currentView==='trending')      return renderTrending();
  if (currentView==='notifications') return renderNotifications();
  if (currentView==='messages')      return renderMessages();
  if (currentView==='profile')       return renderProfile(profileViewId||currentUser.uid);
  if (currentView==='admin' && currentUser.role==='admin') return renderAdmin();
  return renderFeed();
}

// ---- STORIES ----
function renderStories() {
  const users = Object.entries(_users).filter(([uid])=>uid!==currentUser.uid).slice(0,12);
  return `<div class="stories-wrap">
    ${users.map(([uid,u])=>`<div class="story-item" data-view-profile="${uid}">
      <div class="story-ring"><div class="story-inner">${u.avatar||u.username?.[0]||'?'}</div></div>
      <div class="story-name">${esc(u.username)}</div>
    </div>`).join('')}
  </div>`;
}

// ---- FEED ----
function renderFeed() {
  const visible = postsArray().filter(p=>
    p.visibility==='public' ||
    (p.visibility==='private' && p.authorId===currentUser.uid) ||
    (p.visibility==='specific' && (p.authorId===currentUser.uid || currentUser.role==='admin'))
  );
  return renderStories() + (visible.length ? visible.map(renderPost).join('') :
    `<div class="empty-state"><i class="fas fa-satellite-dish"></i><p>Nenhum sinal detectado.<br>Seja o primeiro a transmitir.</p></div>`);
}

function renderPost(post) {
  const author = getUserById(post.authorId);
  if (!author || !author.username) return '';
  const likeCount = likesByPost(post.id).length;
  const liked = userLiked(currentUser.uid, post.id);
  const comments = commentsByPost(post.id);
  const canEdit = currentUser.role==='admin' || post.authorId===currentUser.uid;
  let cls='post'; if(post.isEvent) cls+=' event-post'; if(post.visibility!=='public') cls+=' system-post';
  let avCls='avatar'; if(author.isNPC) avCls+=' npc-ring'; if(author.role==='admin') avCls+=' admin-ring';

  // GhiTube embed — se imageUrl for um link do GhiTube
  const isGhiTubeEmbed = GHITUBE_ORIGIN && post.imageUrl?.startsWith(GHITUBE_ORIGIN);
  let mediaHtml = '';
  if (isGhiTubeEmbed) {
    mediaHtml = `<div class="post-image ghitube-embed">
      <iframe data-ghitube src="${esc(post.imageUrl)}" frameborder="0" allowfullscreen
        style="width:100%;aspect-ratio:16/9;border:none;"></iframe>
    </div>`;
  } else if (post.imageUrl) {
    mediaHtml = `<div class="post-image"><img src="${esc(post.imageUrl)}" loading="lazy"
      onerror="this.src='https://picsum.photos/seed/${post.id}/400/300'"></div>`;
  } else {
    mediaHtml = `<div class="post-no-image">${colorHashtags(post.content)}</div>`;
  }

  return `<div class="${cls}" data-post-id="${post.id}" style="position:relative;">
    ${post.isEvent?`<div class="event-alert"><i class="fas fa-bolt"></i> EVENTO DO SISTEMA</div>`:''}
    <div class="post-header">
      <div class="${avCls}" data-view-profile="${author.uid}">${author.avatar||author.username[0]}</div>
      <div class="post-meta">
        <div class="post-author">
          <span data-view-profile="${author.uid}" style="cursor:pointer;">${esc(author.username)}</span>
          ${author.isNPC?'<span class="badge-tag badge-npc">NPC</span>':''}
          ${author.role==='admin'?'<span class="badge-tag badge-admin">GM</span>':''}
          ${post.visibility==='private'?'<span class="badge-tag badge-sys">PRIV</span>':''}
          ${post.visibility==='specific'?'<span class="badge-tag badge-sys">RESTRITO</span>':''}
          ${post.edited?'<span class="edited-tag">editado</span>':''}
          ${isGhiTubeEmbed?'<span class="badge-tag" style="background:rgba(255,100,0,.15);color:#ff6400;border:1px solid rgba(255,100,0,.35);">GhiTube</span>':''}
        </div>
        <div class="post-time">${timeAgo(post.createdAt||Date.now())}</div>
      </div>
      ${canEdit?`<button class="post-options-btn" data-options="${post.id}"><i class="fas fa-ellipsis-h"></i></button>`:''}
    </div>
    ${openOptionsPostId===post.id ? renderOptionsMenu(post) : ''}
    ${mediaHtml}
    <div class="post-actions">
      <button class="act-btn like-btn ${liked?'liked':''}" data-post="${post.id}">
        <i class="${liked?'fas':'far'} fa-heart"></i>
        <span class="act-count like-count" data-post="${post.id}">${likeCount}</span>
      </button>
      <button class="act-btn" data-toggle-comments="${post.id}">
        <i class="far fa-comment"></i>
        <span class="act-count">${comments.length}</span>
      </button>
      <button class="act-btn" data-share="${post.id}" style="margin-left:auto;">
        <i class="far fa-paper-plane"></i>
      </button>
    </div>
    ${post.imageUrl&&!isGhiTubeEmbed?`<div class="post-body"><span class="caption"><span class="uname">${esc(author.username)}</span>${colorHashtags(post.content)}</span></div>`:''}
    ${post.hiddenContent?`<div class="post-body"><span class="hidden-hint" data-reveal="${post.id}">🔮 Conteúdo oculto — clique para revelar</span></div>`:''}
    <div class="comments-section" id="cmts-${post.id}">
      ${renderCommentsInner(post.id, comments, false)}
    </div>
    <div class="add-comment-row">
      <input class="comment-input-field" data-post="${post.id}" placeholder="Adicione um comentário..." />
      <button class="post-comment-btn" data-post="${post.id}">Publicar</button>
    </div>
  </div>`;
}

function renderCommentsInner(pid, comments, showAll) {
  const shown = showAll ? comments : comments.slice(0,2);
  return `${!showAll&&comments.length>2?`<span class="see-all-comments" data-all-comments="${pid}">Ver todos os ${comments.length} comentários</span>`:''}
    ${shown.map(c=>{
      const au = getUserById(c.authorId);
      return `<div class="comment-item"><span class="uname">${esc(au?.username||'?')}</span><span>${esc(c.content)}</span></div>`;
    }).join('')}`;
}

function renderOptionsMenu(post) {
  const isAdmin = currentUser.role==='admin';
  return `<div class="options-menu">

// ---- SEARCH ----
function renderSearch(results=null) {
  return `<div class="page">
    <div class="page-title"><i class="fas fa-search"></i> Buscar</div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Pesquisar usuários e posts..." />
      <button class="btn-primary" id="doSearch">Buscar</button>
    </div>
    <div id="searchResults">
      ${results ? renderSearchResults(results) : `<div class="empty-state" style="padding:40px 24px;"><i class="fas fa-satellite-dish"></i><p>Digite para iniciar a busca na rede.</p></div>`}
    </div>
  </div>`;
}
function doSearch() {
  const term = document.getElementById('searchInput')?.value.toLowerCase().trim();
  if (!term) return;
  const users = Object.entries(_users).map(([uid,u])=>({uid,...u})).filter(u=>
    u.username?.toLowerCase().includes(term) || u.bio?.toLowerCase().includes(term));
  const posts = postsArray().filter(p=>p.content?.toLowerCase().includes(term)&&(p.visibility==='public'||p.authorId===currentUser.uid));
  document.getElementById('searchResults').innerHTML = renderSearchResults({users,posts});
  attachSearchResultEvents();
}
function renderSearchResults({users, posts}) {
  let html = '';
  if (users.length) {
    html += `<div class="result-group"><div class="result-label">Usuários</div>`;
    html += users.map(u=>`<div class="result-user" data-view-profile="${u.uid}">
      <div class="avatar ${u.isNPC?'npc-ring':''}" style="width:36px;height:36px;font-size:18px;">${u.avatar||u.username?.[0]||'?'}</div>
      <div>
        <div style="font-size:13px;font-weight:700;">${esc(u.username)} ${u.isNPC?'<span class="badge-tag badge-npc">NPC</span>':''}</div>
        <div style="font-size:11px;color:var(--muted);">${esc(u.bio||'')}</div>
      </div>
    </div>`).join('');
    html += '</div>';
  }
  if (posts.length) {
    html += `<div class="result-group"><div class="result-label">Posts</div>`;
    html += posts.map(p=>{
      const au = getUserById(p.authorId);
      return `<div class="result-post"><strong>${esc(au?.username||'?')} · ${timeAgo(p.createdAt)}</strong>${esc(p.content?.slice(0,120))}${(p.content?.length||0)>120?'…':''}</div>`;
    }).join('');
    html += '</div>';
  }
  if (!users.length && !posts.length)
    return `<div class="empty-state" style="padding:40px 24px;"><i class="fas fa-satellite-dish"></i><p>Nenhum resultado encontrado.</p></div>`;
  return html;
}

  const conv = _convs[convId];

  const msgs = _messages[convId] ? Object.values(_messages[convId]).sort((a,b)=>a.ts-b.ts) : [];
  return `<div class="chat-area">
    <div class="chat-header">
      <button class="chat-back" id="chatBack"><i class="fas fa-chevron-left"></i></button>

}

// ---- MODALS ----
function showNewPostModal() {
  let selectedVis = 'public';
  let uploadedImgUrl = '';
  const html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">+ Novo Post</div>
      <textarea class="modal-textarea" id="newPostContent" placeholder="O que está acontecendo na rede?..."></textarea>

      <div class="upload-row">
        <label class="upload-btn" for="imgFileInput"><i class="fas fa-image"></i> Anexar imagem</label>
        <input type="file" id="imgFileInput" accept="image/*" style="display:none">
        <span id="uploadStatus" style="font-size:11px;color:var(--muted);font-family:Space Mono,monospace;"></span>
      </div>
      <div id="imgPreview" style="display:none;margin:8px 0;border-radius:8px;overflow:hidden;max-height:180px;">
        <img id="imgPreviewEl" style="width:100%;object-fit:cover;max-height:180px;">
      </div>
      <input class="modal-input" id="newPostImg" placeholder="ou cole a URL da imagem" style="margin-top:4px;">

      <div class="visibility-row">
        <button class="vis-btn selected" data-vis="public">🌐 Público</button>
        <button class="vis-btn" data-vis="private">🔒 Privado</button>
        <button class="vis-btn" data-vis="specific">👁️ Restrito</button>
      </div>
      <input class="modal-input" id="newPostHidden" placeholder="Conteúdo oculto ARG (opcional)">
      <div class="modal-actions">
        <button class="modal-cancel" id="cancelPost">Cancelar</button>
        <button class="modal-publish" id="confirmPost">Publicar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);

  document.getElementById('imgFileInput').onchange = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    document.getElementById('uploadStatus').textContent = 'Enviando…';
    document.getElementById('confirmPost').disabled = true;
    try {
      uploadedImgUrl = await uploadToCloudinary(file);
      document.getElementById('newPostImg').value = uploadedImgUrl;
      document.getElementById('imgPreviewEl').src = uploadedImgUrl;
      document.getElementById('imgPreview').style.display='block';
      document.getElementById('uploadStatus').textContent = '✓ Pronto';
    } catch(e) {
      document.getElementById('uploadStatus').textContent = 'Erro no upload';
    }
    document.getElementById('confirmPost').disabled = false;
  };

  document.getElementById('cancelPost').onclick  = closeModal;
  document.getElementById('confirmPost').onclick = () => {
    const c      = document.getElementById('newPostContent').value;
    const img    = uploadedImgUrl || document.getElementById('newPostImg').value;
    const hidden = document.getElementById('newPostHidden').value;
    createPost(c, img, selectedVis, hidden);
  };
  document.querySelectorAll('.vis-btn').forEach(btn=>{
    btn.onclick=()=>{ selectedVis=btn.dataset.vis; document.querySelectorAll('.vis-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); };
  });
  document.getElementById('modalOverlay').onclick = e=>{ if(e.target.id==='modalOverlay') closeModal(); };
}

  document.getElementById('confirmEdit').onclick = () => {

      document.getElementById('editPostContentModal').value,
      document.getElementById('editPostImgModal').value,
      document.getElementById('editPostHiddenModal').value);
  };
  document.getElementById('modalOverlay').onclick = e=>{ if(e.target.id==='modalOverlay') closeModal(); };
}

function showEditProfileModal() {
  const html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">Editar Perfil</div>
      <input class="modal-input" id="editBio" placeholder="Bio" value="${esc(currentUser.bio||'')}">
      <div class="upload-row" style="margin-top:10px;">
        <label class="upload-btn" for="avatarFileInput"><i class="fas fa-camera"></i> Foto de perfil</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
        <span id="avatarStatus" style="font-size:11px;color:var(--muted);font-family:Space Mono,monospace;"></span>
      </div>
      <div id="avatarPreviewWrap" style="margin:8px 0;display:${currentUser.avatarUrl?'block':'none'};">
        <img id="avatarPreviewEl" src="${esc(currentUser.avatarUrl||'')}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan);">
      </div>
      <div class="modal-input" style="padding:10px 12px;margin-top:8px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:Space Mono,monospace;">Avatar emoji (alternativo)</div>
        <div class="avatar-picker">${AVATARS.map(a=>`<div class="av-opt ${currentUser.avatar===a?'selected':''}" data-av="${a}">${a}</div>`).join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="cancelEditProfile">Cancelar</button>
        <button class="modal-publish" id="confirmEditProfile">Salvar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  let selectedAv = currentUser.avatar||'✨';
  let newAvatarUrl = currentUser.avatarUrl||'';

  document.getElementById('avatarFileInput').onchange = async (e)=>{
    const file = e.target.files?.[0]; if (!file) return;
    document.getElementById('avatarStatus').textContent = 'Enviando…';
    document.getElementById('confirmEditProfile').disabled = true;
    try {
      newAvatarUrl = await uploadToCloudinary(file);
      document.getElementById('avatarPreviewEl').src = newAvatarUrl;
      document.getElementById('avatarPreviewWrap').style.display='block';
      document.getElementById('avatarStatus').textContent='✓ Pronto';
    } catch(e2) { document.getElementById('avatarStatus').textContent='Erro'; }
    document.getElementById('confirmEditProfile').disabled = false;
  };

  document.querySelectorAll('.av-opt').forEach(btn=>{
    btn.onclick=()=>{ selectedAv=btn.dataset.av; document.querySelectorAll('.av-opt').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); };
  });
  document.getElementById('cancelEditProfile').onclick = closeModal;
  document.getElementById('confirmEditProfile').onclick = async ()=>{
    const bio = document.getElementById('editBio').value;
    currentUser.bio=bio; currentUser.avatar=selectedAv; currentUser.avatarUrl=newAvatarUrl;
    await fbUpdateUser(currentUser.uid, { bio, avatar:selectedAv, avatarUrl:newAvatarUrl });
    closeModal(); toast('Perfil atualizado!');
  };
  document.getElementById('modalOverlay').onclick = e=>{ if(e.target.id==='modalOverlay') closeModal(); };
}

function closeModal() { document.getElementById('modalOverlay')?.remove(); }

// =====================================================
// EVENT BINDING
// =====================================================
function attachLoginEvents() {
  document.getElementById('loginBtn')?.addEventListener('click', async ()=>{
    const email = document.getElementById('loginEmail').value;
    const pass  = document.getElementById('loginPass').value;
    const res   = await login(email, pass);
    if (res !== true) {
      const e = document.getElementById('loginError');
      e.textContent = res || 'Email ou senha incorretos.'; e.style.display='block';
    }
  });
  document.getElementById('loginPass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
  document.getElementById('regBtn')?.addEventListener('click', async ()=>{
    const u   = document.getElementById('regUser').value;
    const em  = document.getElementById('regEmail').value;
    const p   = document.getElementById('regPass').value;
    const res = await register(u, em, p);
    if (res==='exists') { const e=document.getElementById('regError'); e.textContent='Username ou email já existe.'; e.style.display='block'; }
    else if (res==='fill') { const e=document.getElementById('regError'); e.textContent='Preencha todos os campos.'; e.style.display='block'; }
    else if (res!=='ok') { const e=document.getElementById('regError'); e.textContent=res; e.style.display='block'; }
  });
}

function attachMainEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click',()=>{ currentView=btn.dataset.nav; profileViewId=null; if(currentView!=='messages') activeConvId=null; openOptionsPostId=null; render(); });
  });
  document.getElementById('nav-newpost')?.addEventListener('click', showNewPostModal);
  document.getElementById('hdr-notif')?.addEventListener('click',()=>{ currentView='notifications'; openOptionsPostId=null; render(); });
  document.getElementById('hdr-msg')?.addEventListener('click',()=>{ currentView='messages'; openOptionsPostId=null; render(); });
  document.getElementById('hdr-logout')?.addEventListener('click', logout);

  // Profile
  document.querySelectorAll('[data-view-profile]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); profileViewId=el.dataset.viewProfile; currentView='profile'; openOptionsPostId=null; render(); });
  });

  // Like
  document.querySelectorAll('.like-btn').forEach(btn=>{
    btn.addEventListener('click',()=>toggleLike(btn.dataset.post));
  });

  // Comments toggle
  document.querySelectorAll('[data-toggle-comments]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sec=document.getElementById('cmts-'+btn.dataset.toggleComments);
      if(sec){ sec.style.display=sec.style.display==='none'?'block':'none'; }
    });
  });
  document.querySelectorAll('[data-all-comments]').forEach(el=>{
    el.addEventListener('click',()=>{
      const pid=el.dataset.allComments;
      const comments=commentsByPost(pid);
      const sec=document.getElementById('cmts-'+pid);
      if(sec) sec.innerHTML=renderCommentsInner(pid,comments,true);
    });
  });

  // Submit comment
  document.querySelectorAll('.post-comment-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid=btn.dataset.post;
      const inp=document.querySelector(`.comment-input-field[data-post="${pid}"]`);
      if(inp?.value.trim()){ addComment(pid,inp.value); inp.value=''; }
    });
  });
  document.querySelectorAll('.comment-input-field').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ const pid=inp.dataset.post; if(inp.value.trim()){ addComment(pid,inp.value); inp.value=''; } }
    });
  });

  // Hidden reveal
  document.querySelectorAll('[data-reveal]').forEach(el=>{
    el.addEventListener('click',()=>{
      const pid=el.dataset.reveal;
      const post=_posts[pid];
      if(post?.hiddenContent){
        el.outerHTML=`<div class="post-body"><div class="hidden-revealed">${esc(post.hiddenContent)}</div></div>`;
      }
    });
  });

  // Post options
  document.querySelectorAll('.post-options-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation(); const pid=btn.dataset.options;
      openOptionsPostId=openOptionsPostId===pid?null:pid; render(); });
  });
  document.querySelectorAll('[data-edit-post]').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation(); openOptionsPostId=null; showEditPostModal(btn.dataset.editPost); });
  });
  document.querySelectorAll('[data-delete-post]').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation(); deletePost(btn.dataset.deletePost); });
  });
  document.querySelectorAll('[data-toggle-visibility]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const pid=btn.dataset.toggleVisibility;
      const p=_posts[pid]; if(!p) return;
      const opts=['public','private','specific'];
      const next=opts[(opts.indexOf(p.visibility)+1)%opts.length];
      fbEditPost(pid,{visibility:next}); openOptionsPostId=null; toast(`Visibilidade: ${next}`);
    });
  });

  // Profile actions
  document.getElementById('followBtn')?.addEventListener('click',()=>{ followUser(document.getElementById('followBtn').dataset.id); });
  document.getElementById('editProfileBtn')?.addEventListener('click', showEditProfileModal);
  document.getElementById('msgUserBtn')?.addEventListener('click',()=>{ startConvWithUser(document.getElementById('msgUserBtn').dataset.id); });

  // Search
  document.getElementById('doSearch')?.addEventListener('click', doSearch);
  document.getElementById('searchInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
  attachSearchResultEvents();

  // Trending
  document.querySelectorAll('[data-search-tag]').forEach(el=>{
    el.addEventListener('click',()=>{
      currentView='search'; render();
      setTimeout(()=>{ const si=document.getElementById('searchInput'); if(si){ si.value=el.dataset.searchTag; doSearch(); } },50);
    });
  });

  // Messages
  document.querySelectorAll('[data-open-conv]').forEach(el=>{
    el.addEventListener('click',()=>{
      activeConvId=el.dataset.openConv;
      if (!_messages[activeConvId]) {
        _messages[activeConvId]={};
        _unsubs.push(dbListen(`messages/${activeConvId}`, v=>{ _messages[activeConvId]=v||{}; renderIfNeeded(); }));
      }
      render();
    });
  });
  document.getElementById('chatBack')?.addEventListener('click',()=>{ activeConvId=null; render(); });
  document.getElementById('sendMsgBtn')?.addEventListener('click',()=>{
    const inp=document.getElementById('chatInput'); if(!inp) return;
    const conv=_convs[activeConvId]; if(!conv) return;
    const otherUid=Object.keys(conv.participants||{}).find(p=>p!==currentUser.uid);
    if(inp.value.trim()){ sendMessage(otherUid, inp.value); inp.value=''; }
  });
  document.getElementById('chatInput')?.addEventListener('keydown',e=>{
    if(e.key==='Enter') document.getElementById('sendMsgBtn')?.click();
  });
  document.getElementById('startNewChat')?.addEventListener('click',()=>{
    const panel=document.getElementById('newChatPanel'); if(panel) panel.style.display=panel.style.display==='none'?'block':'none';
  });
  document.querySelectorAll('[data-start-conv]').forEach(el=>{
    el.addEventListener('click',()=>startConvWithUser(el.dataset.startConv));
  });

  // Share
  document.querySelectorAll('[data-share]').forEach(btn=>{
    btn.addEventListener('click',()=>toast('Link copiado!'));
  });

  // Admin
  document.getElementById('createNPCBtn')?.addEventListener('click',async ()=>{
    const u=document.getElementById('npcUser').value,
          e=document.getElementById('npcEmail').value,
          p=document.getElementById('npcPass').value,
          b=document.getElementById('npcBio').value;
    if(await createNPC(u,e,p,b)) toast('NPC criado: '+u); else toast('Erro ao criar NPC.','err');
  });
  document.getElementById('createSystemPostBtn')?.addEventListener('click',()=>{
    createSystemPost(document.getElementById('systemMsg').value);
  });
  document.getElementById('editPostBtn')?.addEventListener('click',async ()=>{
    const pid=document.getElementById('editPostId').value;
    const c=document.getElementById('editPostContent').value;
    const img=document.getElementById('editPostImg').value;
    const hidden=document.getElementById('editPostHidden').value;
    let ts=document.getElementById('editPostTs').value;
    if(ts==='agora') ts=new Date().toISOString();
    else if(ts.startsWith('há')){ const m=parseInt(ts.replace(/\D/g,'')); ts=new Date(Date.now()-m*60000).toISOString(); }
    await adminEditPost(pid,c,img,ts,hidden);
  });
  document.getElementById('delPostBtn')?.addEventListener('click',async ()=>{
    const pid=document.getElementById('delPostId').value;
    await deletePost(pid); toast('Post removido.');
  });
  document.getElementById('listUsersBtn')?.addEventListener('click',async ()=>{
    const all=await fbListUsers();
    document.getElementById('userListOutput').innerHTML=all.map(u=>`
      <div class="user-list-row">
        <span>${u.avatar||'?'}</span>
        <span class="uname">${esc(u.username)}</span>
        <span class="role-tag">${u.role}${u.isNPC?' · NPC':''}</span>
        <span style="font-size:10px;color:var(--muted);">${u.uid?.slice(0,8)}</span>
      </div>`).join('');
  });

  document.addEventListener('click', handleOutsideClick, {once:true});
}

function handleOutsideClick(e) {
  if(openOptionsPostId && !e.target.closest('.post-options-btn') && !e.target.closest('.options-menu')){
    openOptionsPostId=null; render();
  }
}
function attachSearchResultEvents() {
  document.querySelectorAll('[data-view-profile]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); profileViewId=el.dataset.viewProfile; currentView='profile'; openOptionsPostId=null; render(); });
  });
}

// =====================================================
// INIT
// =====================================================
setupGhiTubeBridge();

onAuthStateChanged(auth, async (fbUser) => {
  if (fbUser) {
    if (!currentUser) {
      const udata = await fbGetUser(fbUser.uid);
      if (udata) {
        currentUser = { uid: fbUser.uid, ...udata };
        window._bubbleCurrentUser = currentUser;
        startListeners();
        currentView = 'feed';
      }
    }
  } else {
    currentUser = null;
    window._bubbleCurrentUser = null;
  }
  render();
});
</script>

<style>
:root {
  --bg: #070710; --bg2: #0d0d1a; --bg3: #12121f;
  --border: rgba(0,255,255,0.12); --border2: rgba(255,61,127,0.15);
  --cyan: #00ffe5; --pink: #ff3d7f; --purple: #9b5de5;
  --yellow: #f5c400; --text: #e8e8f0; --muted: #5a5a7a;
  --card: #0f0f1e; --hover: rgba(0,255,229,0.06);
  --glow-c: 0 0 18px rgba(0,255,229,0.25);
  --glow-p: 0 0 18px rgba(255,61,127,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Syne',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(0,255,229,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(155,93,229,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.app{max-width:620px;margin:0 auto;min-height:100vh;position:relative;z-index:1;padding-bottom:80px;}
/* HEADER */
.header{position:sticky;top:0;z-index:200;background:rgba(7,7,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:1.5rem;letter-spacing:-1px;background:linear-gradient(120deg,var(--cyan) 0%,var(--purple) 60%,var(--pink) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;}
.logo::after{content:'●';position:absolute;right:-14px;top:2px;font-size:7px;color:var(--cyan);animation:blink 1.4s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.header-right{display:flex;gap:18px;align-items:center;}
.icon-btn{background:none;border:none;color:var(--muted);font-size:1.25rem;cursor:pointer;position:relative;transition:color .2s;}
.icon-btn:hover{color:var(--cyan);}
.badge{position:absolute;top:-5px;right:-6px;background:var(--pink);color:#fff;font-size:9px;border-radius:20px;padding:1px 5px;font-family:'Space Mono',monospace;}
/* STORIES */
.stories-wrap{padding:12px 0;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;scrollbar-width:none;padding-left:18px;}
.stories-wrap::-webkit-scrollbar{display:none;}
.story-item{display:inline-flex;flex-direction:column;align-items:center;margin-right:14px;cursor:pointer;gap:6px;vertical-align:top;}
.story-ring{width:62px;height:62px;border-radius:50%;background:conic-gradient(var(--cyan),var(--purple),var(--pink),var(--cyan));display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0;}
.story-ring:hover{transform:scale(1.08);}
.story-inner{width:56px;height:56px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
.story-inner img{width:100%;height:100%;object-fit:cover;}
.story-name{font-size:10px;color:var(--muted);max-width:65px;overflow:hidden;text-overflow:ellipsis;text-align:center;white-space:nowrap;}
/* POST */
.post{background:var(--card);border-bottom:1px solid var(--border);animation:fadeInUp .35s ease both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.post.event-post{border-left:3px solid var(--yellow);}
.post.system-post{border-left:3px solid var(--cyan);}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1.5px solid var(--border);overflow:hidden;position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar.npc-ring{border-color:var(--purple);}
.avatar.admin-ring{border-color:var(--pink);}
.post-meta{flex:1;min-width:0;}
.post-author{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.post-time{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:1px;}
.badge-tag{font-size:9px;border-radius:20px;padding:1px 7px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.5px;}
.badge-npc{background:rgba(155,93,229,.15);color:var(--purple);border:1px solid rgba(155,93,229,.4);}
.badge-admin{background:rgba(255,61,127,.15);color:var(--pink);border:1px solid rgba(255,61,127,.4);}
.badge-sys{background:rgba(0,255,229,.12);color:var(--cyan);border:1px solid rgba(0,255,229,.3);}
.post-options-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px 8px;transition:color .2s;}
.post-options-btn:hover{color:var(--text);}
.post-image{width:100%;position:relative;background:var(--bg3);min-height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.post-image img{width:100%;display:block;object-fit:cover;}
.ghitube-embed{min-height:unset;}
.post-no-image{padding:18px 14px;font-size:15px;line-height:1.6;color:var(--text);}
.hashtag{color:var(--cyan);}
.post-actions{padding:8px 14px 4px;display:flex;align-items:center;gap:16px;}
.act-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;transition:color .2s,transform .15s;display:flex;align-items:center;gap:6px;}
.act-btn:hover{color:var(--text);transform:scale(1.1);}
.act-btn.liked{color:var(--pink);}
.act-btn.liked i{animation:heartPop .25s ease;}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.act-count{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);}
.act-btn.liked .act-count{color:var(--pink);}
.post-body{padding:4px 14px 10px;}
.caption{font-size:13.5px;line-height:1.55;}
.caption .uname{font-weight:700;margin-right:5px;}
.hidden-hint{display:inline-block;margin-top:8px;font-size:11px;color:var(--purple);font-family:'Space Mono',monospace;cursor:pointer;border:1px solid rgba(155,93,229,.3);border-radius:4px;padding:2px 8px;transition:background .2s;}
.hidden-hint:hover{background:rgba(155,93,229,.15);}
.hidden-revealed{margin-top:8px;padding:8px 10px;background:rgba(155,93,229,.1);border:1px solid rgba(155,93,229,.3);border-radius:6px;font-size:12px;color:var(--purple);font-family:'Space Mono',monospace;animation:fadeInUp .25s ease;}
.comments-section{padding:0 14px 6px;}
.comment-item{font-size:12.5px;padding:3px 0;line-height:1.5;}
.comment-item .uname{font-weight:700;color:var(--text);margin-right:4px;}
.comment-item span{color:#b0b0c8;}
.see-all-comments{font-size:11px;color:var(--muted);cursor:pointer;margin-bottom:4px;display:inline-block;}
.see-all-comments:hover{color:var(--cyan);}
.add-comment-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:1px solid rgba(255,255,255,0.04);}
.comment-input-field{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;}
.comment-input-field::placeholder{color:var(--muted);}
.post-comment-btn{background:none;border:none;color:var(--cyan);font-weight:700;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;}
.post-comment-btn:hover{opacity:.7;}
.edited-tag{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-left:4px;}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:620px;margin:0 auto;background:rgba(7,7,16,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:10px 8px 16px;z-index:200;}
.nav-btn{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:6px 10px;border-radius:8px;transition:color .2s,background .2s;position:relative;}
.nav-btn:hover,.nav-btn.active{color:var(--cyan);}
.nav-btn.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--cyan);}
.nav-btn.skull{color:var(--pink)!important;}
/* PAGES */
.page{padding:0;animation:fadeInUp .3s ease;}
.page-title{padding:16px 18px 10px;font-size:1.1rem;font-weight:800;letter-spacing:-.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.page-title i{color:var(--cyan);font-size:.9rem;}
/* SEARCH */
.search-bar{display:flex;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--cyan);}
.search-input::placeholder{color:var(--muted);}
.btn-primary{background:var(--cyan);color:var(--bg);border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s;}
.btn-primary:hover{opacity:.8;}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;transition:border-color .2s;}
.btn-ghost:hover{border-color:var(--cyan);}
.result-group{padding:12px 18px 4px;}
.result-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:10px;}
.result-user{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .2s;}
.result-user:hover{background:var(--hover);margin:0 -18px;padding:8px 18px;}
.result-post{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:var(--muted);line-height:1.5;}
.result-post strong{color:var(--text);font-size:11px;font-family:'Space Mono',monospace;display:block;margin-bottom:2px;}
/* NOTIFS */
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.04);animation:fadeInUp .3s ease;transition:background .2s;}
.notif-item:hover{background:var(--hover);}
.notif-text{flex:1;font-size:13px;line-height:1.5;}
.notif-text strong{color:var(--cyan);}
.notif-time{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
/* MESSAGES */
.conv-list{padding:0;}
.conv-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s;}
.conv-item:hover{background:var(--hover);}
.conv-name{font-weight:700;font-size:13.5px;}
.conv-preview{font-size:11px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace;}
.chat-area{display:flex;flex-direction:column;height:calc(100vh - 200px);}
.chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);}
.chat-back{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:1rem;}
.chat-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;}
.msg-bubble.sent{align-self:flex-end;background:rgba(0,255,229,.12);border:1px solid rgba(0,255,229,.2);border-bottom-right-radius:4px;color:var(--text);}
.msg-bubble.recv{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-time{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px;text-align:right;}
.chat-input-row{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg2);}
.chat-text-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s;}
.chat-text-input:focus{border-color:var(--cyan);}
.send-btn{background:var(--cyan);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--bg);cursor:pointer;font-size:.9rem;flex-shrink:0;transition:opacity .2s;}
.send-btn:hover{opacity:.8;}
.new-chat-btn{margin:12px 18px;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:10px;text-align:center;color:var(--muted);cursor:pointer;font-size:13px;transition:border-color .2s,color .2s;}
.new-chat-btn:hover{border-color:var(--cyan);color:var(--cyan);}
/* TRENDING */
.trending-item{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s;}
.trending-item:hover{background:var(--hover);}
.trend-num{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;width:24px;}
.trend-tag{flex:1;font-size:14px;font-weight:700;color:var(--cyan);}
.trend-count{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
/* PROFILE */
.profile-hero{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.profile-top{display:flex;align-items:flex-start;gap:16px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;border:2px solid var(--border);flex-shrink:0;overflow:hidden;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.npc-profile{border-color:var(--purple);}
.admin-profile{border-color:var(--pink);}
.profile-stats{display:flex;gap:20px;padding-top:8px;}
.stat-item{text-align:center;}
.stat-num{font-size:17px;font-weight:800;}
.stat-label{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.profile-name{font-size:15px;font-weight:800;}
.profile-bio{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;}
.profile-actions{display:flex;gap:10px;margin-top:14px;}
.follow-btn{flex:1;background:var(--cyan);color:var(--bg);border:none;border-radius:8px;padding:9px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s;}
.follow-btn:hover{opacity:.8;}
.follow-btn.following{background:transparent;color:var(--text);border:1px solid var(--border);}
.edit-profile-btn{flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;transition:border-color .2s;}
.edit-profile-btn:hover{border-color:var(--cyan);}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.grid-cell{aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
.grid-cell-inner{color:var(--muted);font-size:1.2rem;}
/* ADMIN */
.admin-section{padding:16px 18px;border-bottom:1px solid var(--border);}
.admin-section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.admin-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.admin-input{flex:1;min-width:120px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Space Mono',monospace;outline:none;transition:border-color .2s;}
.admin-input:focus{border-color:var(--cyan);}
.btn-sys{background:rgba(0,255,229,.1);color:var(--cyan);border:1px solid rgba(0,255,229,.25);border-radius:6px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;transition:background .2s;}
.btn-sys:hover{background:rgba(0,255,229,.2);}
.btn-warn{background:rgba(245,196,0,.1);color:var(--yellow);border:1px solid rgba(245,196,0,.25);border-radius:6px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;}
.btn-danger{background:rgba(255,61,127,.1);color:var(--pink);border:1px solid rgba(255,61,127,.25);border-radius:6px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;}
.user-list-table{margin-top:12px;}
.user-list-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;font-family:'Space Mono',monospace;}
.user-list-row .uname{flex:1;color:var(--text);}
.user-list-row .role-tag{color:var(--muted);font-size:10px;}
/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,255,229,0.06) 0%,transparent 60%);}
.login-logo{font-family:'Space Mono',monospace;font-size:3rem;font-weight:700;background:linear-gradient(120deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px;letter-spacing:-2px;}
.login-tagline{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:40px;letter-spacing:3px;text-transform:uppercase;}
.login-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:16px;}
.login-card h3{font-size:14px;color:var(--muted);margin-bottom:18px;font-weight:600;letter-spacing:.5px;}
.login-field{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;margin-bottom:10px;transition:border-color .2s;}
.login-field:focus{border-color:var(--cyan);}
.login-field::placeholder{color:var(--muted);}
.login-btn{width:100%;background:linear-gradient(120deg,var(--cyan),var(--purple));border:none;border-radius:8px;padding:13px;color:var(--bg);font-size:14px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.login-btn:hover{opacity:.85;}
.login-error{font-size:12px;color:var(--pink);font-family:'Space Mono',monospace;margin-bottom:8px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px;animation:slideUp .25s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:15px;font-weight:800;margin-bottom:16px;}
.modal-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;resize:vertical;min-height:90px;transition:border-color .2s;}
.modal-textarea:focus{border-color:var(--cyan);}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;margin-top:8px;transition:border-color .2s;}
.modal-input:focus{border-color:var(--cyan);}
.modal-input::placeholder{color:var(--muted);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
.modal-cancel{background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;}
.modal-publish{background:var(--cyan);color:var(--bg);border:none;border-radius:8px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s;}
.modal-publish:hover{opacity:.8;}
.modal-publish:disabled{opacity:.4;cursor:not-allowed;}
/* UPLOAD */
.upload-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.upload-btn{background:rgba(0,255,229,.08);color:var(--cyan);border:1px solid rgba(0,255,229,.25);border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;transition:background .2s;}
.upload-btn:hover{background:rgba(0,255,229,.15);}
/* OPTIONS MENU */
.options-menu{position:absolute;right:14px;top:46px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;z-index:100;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideDown .15s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.opt-item{display:block;width:100%;background:none;border:none;padding:11px 16px;text-align:left;font-size:13px;color:var(--text);cursor:pointer;font-family:'Syne',sans-serif;transition:background .15s;border-radius:10px;}
.opt-item:hover{background:var(--hover);}
.opt-item.danger{color:var(--pink);}
/* EVENT ALERT */
.event-alert{margin:0;padding:10px 18px;background:linear-gradient(90deg,rgba(245,196,0,.1),transparent);border-left:3px solid var(--yellow);font-size:12px;color:var(--yellow);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:8px;}
.event-alert i{animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted);font-family:'Space Mono',monospace;}
.empty-state i{font-size:2.5rem;margin-bottom:14px;display:block;opacity:.4;}
.empty-state p{font-size:12px;line-height:1.7;}
/* VISIBILITY */
.visibility-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.vis-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;}
.vis-btn.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,229,.08);}
/* AVATAR PICKER */
.avatar-picker{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;}
.av-opt{width:44px;height:44px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:var(--bg3);transition:border-color .2s;}
.av-opt.selected{border-color:var(--cyan);}
.av-opt:hover{border-color:var(--muted);}
/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;font-family:'Space Mono',monospace;color:var(--cyan);z-index:9999;animation:toastIn .25s ease;white-space:nowrap;pointer-events:none;}
.toast.toast-err{color:var(--pink);border-color:rgba(255,61,127,.3);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* LOADER */
.global-loader{display:none;position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,var(--cyan),var(--purple));color:var(--bg);font-size:11px;font-family:'Space Mono',monospace;font-weight:700;text-align:center;padding:6px;z-index:9999;letter-spacing:1px;}
/* RESPONSIVE */
@media(max-width:480px){.profile-stats{gap:14px;}.stat-num{font-size:15px;}}
</style>
</head>
<body>
<div id="app"><div class="global-loader" id="globalLoader" style="display:block;">Inicializando rede...</div></div>
</body>
</html>
