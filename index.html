<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bubble · Rede Neural</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070710;
  --bg2: #0d0d1a;
  --bg3: #12121f;
  --border: rgba(0,255,255,0.12);
  --border2: rgba(255,61,127,0.15);
  --cyan: #00ffe5;
  --pink: #ff3d7f;
  --purple: #9b5de5;
  --yellow: #f5c400;
  --orange: #ff8c00;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --card: #0f0f1e;
  --hover: rgba(0,255,229,0.06);
  --glow-c: 0 0 18px rgba(0,255,229,0.25);
  --glow-p: 0 0 18px rgba(255,61,127,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse 80% 60% at 20% -10%, rgba(0,255,229,0.04) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 110%, rgba(155,93,229,0.05) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.app { max-width: 620px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; padding-bottom: 80px; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(7,7,16,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-weight: 700; font-size: 1.5rem;
  letter-spacing: -1px;
  background: linear-gradient(120deg, var(--cyan) 0%, var(--purple) 60%, var(--pink) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  position: relative;
}
.logo::after {
  content: '●';
  position: absolute; right: -14px; top: 2px;
  font-size: 7px; color: var(--cyan);
  animation: blink 1.4s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.header-right { display: flex; gap: 18px; align-items: center; }
.icon-btn {
  background: none; border: none;
  color: var(--muted); font-size: 1.25rem;
  cursor: pointer; position: relative;
  transition: color .2s;
}
.icon-btn:hover { color: var(--cyan); }
.badge {
  position: absolute; top: -5px; right: -6px;
  background: var(--pink); color: #fff;
  font-size: 9px; border-radius: 20px;
  padding: 1px 5px; font-family: 'Space Mono', monospace;
}

/* STORIES */
.stories-wrap {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; white-space: nowrap;
  scrollbar-width: none; padding-left: 18px;
}
.stories-wrap::-webkit-scrollbar { display: none; }
.story-item {
  display: inline-flex; flex-direction: column; align-items: center;
  margin-right: 14px; cursor: pointer; gap: 6px;
  vertical-align: top;
}
.story-ring {
  width: 62px; height: 62px; border-radius: 50%;
  background: conic-gradient(var(--cyan), var(--purple), var(--pink), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s; flex-shrink: 0;
}
.story-ring:hover { transform: scale(1.08); }
.story-inner {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; overflow: hidden;
}
.story-inner img { width: 100%; height: 100%; object-fit: cover; }
.story-name { font-size: 10px; color: var(--muted); max-width: 65px; overflow: hidden; text-overflow: ellipsis; text-align: center; white-space: nowrap; }

/* POST */
.post {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  animation: fadeInUp .35s ease both;
}
@keyframes fadeInUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.post.event-post { border-left: 3px solid var(--yellow); }
.post.system-post { border-left: 3px solid var(--cyan); }
.post-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px 10px;
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  border: 1.5px solid var(--border);
  overflow: hidden; position: relative;
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.avatar.npc-ring { border-color: var(--purple); }
.avatar.admin-ring { border-color: var(--pink); }
.post-meta { flex: 1; min-width: 0; }
.post-author {
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.post-time { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 1px; }
.badge-tag {
  font-size: 9px; border-radius: 20px; padding: 1px 7px;
  font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: .5px;
}
.badge-npc { background: rgba(155,93,229,.15); color: var(--purple); border: 1px solid rgba(155,93,229,.4); }
.badge-admin { background: rgba(255,61,127,.15); color: var(--pink); border: 1px solid rgba(255,61,127,.4); }
.badge-sys { background: rgba(0,255,229,.12); color: var(--cyan); border: 1px solid rgba(0,255,229,.3); }
.badge-ghitube { background: rgba(255,140,0,.15); color: var(--orange); border: 1px solid rgba(255,140,0,.4); }
.post-options-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1rem; padding: 4px 8px;
  transition: color .2s;
}
.post-options-btn:hover { color: var(--text); }
.post-image {
  width: 100%; position: relative;
  background: var(--bg3); min-height: 220px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.post-image img { width: 100%; display: block; object-fit: cover; }
.post-image iframe { width:100%; height:320px; border:none; }
.post-no-image {
  padding: 18px 14px;
  font-size: 15px; line-height: 1.6; color: var(--text);
}
.hashtag { color: var(--cyan); }
.post-actions {
  padding: 8px 14px 4px;
  display: flex; align-items: center; gap: 16px;
}
.act-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1.4rem; transition: color .2s, transform .15s;
  display: flex; align-items: center; gap: 6px;
}
.act-btn:hover { color: var(--text); transform: scale(1.1); }
.act-btn.liked { color: var(--pink); }
.act-btn.liked i { animation: heartPop .25s ease; }
@keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
.act-count { font-size: 11px; font-family:'Space Mono',monospace; color: var(--muted); }
.act-btn.liked .act-count { color: var(--pink); }
.post-body { padding: 4px 14px 10px; }
.caption { font-size: 13.5px; line-height: 1.55; }
.caption .uname { font-weight: 700; margin-right: 5px; }
.hidden-hint {
  display: inline-block; margin-top: 8px;
  font-size: 11px; color: var(--purple);
  font-family: 'Space Mono', monospace;
  cursor: pointer; border: 1px solid rgba(155,93,229,.3);
  border-radius: 4px; padding: 2px 8px;
  transition: background .2s;
}
.hidden-hint:hover { background: rgba(155,93,229,.15); }
.hidden-revealed {
  margin-top: 8px; padding: 8px 10px;
  background: rgba(155,93,229,.1); border: 1px solid rgba(155,93,229,.3);
  border-radius: 6px; font-size: 12px; color: var(--purple);
  font-family: 'Space Mono', monospace;
  animation: fadeInUp .25s ease;
}
.comments-section { padding: 0 14px 6px; }
.comment-item { font-size: 12.5px; padding: 3px 0; line-height: 1.5; }
.comment-item .uname { font-weight: 700; color: var(--text); margin-right: 4px; }
.comment-item span { color: #b0b0c8; }
.see-all-comments { font-size: 11px; color: var(--muted); cursor: pointer; margin-bottom: 4px; display: inline-block; }
.see-all-comments:hover { color: var(--cyan); }
.add-comment-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.comment-input-field {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-size: 13px;
  font-family: 'Syne', sans-serif; outline: none;
}
.comment-input-field::placeholder { color: var(--muted); }
.post-comment-btn {
  background: none; border: none; color: var(--cyan);
  font-weight: 700; font-size: 12px; cursor: pointer;
  font-family: 'Syne', sans-serif;
}
.post-comment-btn:hover { opacity: .7; }
.edited-tag { font-size: 10px; color: var(--muted); font-family:'Space Mono',monospace; margin-left: 4px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 620px; margin: 0 auto;
  background: rgba(7,7,16,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 10px 8px 16px;
  z-index: 200;
}
.nav-btn {
  background: none; border: none;
  color: var(--muted); font-size: 1.3rem;
  cursor: pointer; padding: 6px 10px;
  border-radius: 8px; transition: color .2s, background .2s;
  position: relative;
}
.nav-btn:hover, .nav-btn.active { color: var(--cyan); }
.nav-btn.active::after {
  content: '';
  position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--cyan);
}
.nav-btn.skull { color: var(--pink) !important; }
.nav-btn.skull.active { color: var(--pink) !important; }

/* SECTION PAGES */
.page { padding: 0; animation: fadeInUp .3s ease; }
.page-title {
  padding: 16px 18px 10px;
  font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.page-title i { color: var(--cyan); font-size: .9rem; }

/* SEARCH */
.search-bar {
  display: flex; gap: 10px; padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  color: var(--text); font-size: 13px; font-family: 'Syne', sans-serif;
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--cyan); }
.search-input::placeholder { color: var(--muted); }
.btn-primary {
  background: var(--cyan); color: var(--bg);
  border: none; border-radius: 8px; padding: 10px 16px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  font-family: 'Syne', sans-serif; transition: opacity .2s;
}
.btn-primary:hover { opacity: .8; }
.btn-ghost {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px; font-weight: 600; font-size: 12px;
  cursor: pointer; font-family: 'Syne', sans-serif; transition: border-color .2s;
}
.btn-ghost:hover { border-color: var(--cyan); }
.result-group { padding: 12px 18px 4px; }
.result-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 10px; }
.result-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .2s;
}
.result-user:hover { background: var(--hover); margin: 0 -18px; padding: 8px 18px; }
.result-post {
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 13px; color: var(--muted); line-height: 1.5;
}
.result-post strong { color: var(--text); font-size: 11px; font-family:'Space Mono',monospace; display:block; margin-bottom:2px; }

/* NOTIFICATIONS */
.notif-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,.04);
  animation: fadeInUp .3s ease;
  transition: background .2s;
}
.notif-item:hover { background: var(--hover); }
.notif-item.unread { background: rgba(0,255,229,.03); }
.notif-text { flex: 1; font-size: 13px; line-height: 1.5; }
.notif-text strong { color: var(--cyan); }
.notif-time { font-size: 10px; color: var(--muted); font-family:'Space Mono',monospace; }

/* MESSAGES */
.conv-list { padding: 0; }
.conv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer; transition: background .2s;
}
.conv-item:hover { background: var(--hover); }
.conv-name { font-weight: 700; font-size: 13.5px; }
.conv-preview { font-size: 11px; color: var(--muted); margin-top: 2px; font-family:'Space Mono',monospace; }
.chat-area { display: flex; flex-direction: column; height: calc(100vh - 200px); }
.chat-header {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2);
}
.chat-back { background:none; border:none; color:var(--cyan); cursor:pointer; font-size:1rem; }
.chat-messages { flex:1; overflow-y:auto; padding: 14px 18px; display:flex; flex-direction:column; gap:10px; }
.msg-bubble {
  max-width: 75%; padding: 10px 14px; border-radius: 14px;
  font-size: 13px; line-height: 1.5;
}
.msg-bubble.sent {
  align-self: flex-end; background: rgba(0,255,229,.12);
  border: 1px solid rgba(0,255,229,.2); border-bottom-right-radius: 4px;
  color: var(--text);
}
.msg-bubble.recv {
  align-self: flex-start; background: var(--bg3);
  border: 1px solid var(--border); border-bottom-left-radius: 4px;
}
.msg-time { font-size: 9px; color: var(--muted); font-family:'Space Mono',monospace; margin-top: 3px; text-align:right; }
.chat-input-row {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; background: var(--bg2);
}
.chat-text-input {
  flex:1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 22px; padding: 10px 16px;
  color: var(--text); font-size: 13px; font-family:'Syne',sans-serif;
  outline: none; transition: border-color .2s;
}
.chat-text-input:focus { border-color: var(--cyan); }
.send-btn {
  background: var(--cyan); border:none; border-radius:50%;
  width: 40px; height:40px; display:flex; align-items:center; justify-content:center;
  color: var(--bg); cursor:pointer; font-size:.9rem; flex-shrink:0;
  transition: opacity .2s;
}
.send-btn:hover { opacity:.8; }
.new-chat-btn {
  margin: 12px 18px;
  background: var(--bg3); border: 1px dashed var(--border);
  border-radius: 8px; padding: 10px; text-align:center;
  color: var(--muted); cursor:pointer; font-size:13px;
  transition: border-color .2s, color .2s;
}
.new-chat-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* TRENDING */
.trending-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer; transition: background .2s;
}
.trending-item:hover { background: var(--hover); }
.trend-tag { font-size: 14px; font-weight: 700; color: var(--cyan); font-family:'Space Mono',monospace; }
.trend-count { font-size: 11px; color: var(--muted); font-family:'Space Mono',monospace; }
.trend-num { font-size: 10px; color: var(--muted); width: 20px; }

/* PROFILE */
.profile-hero {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.profile-top { display:flex; gap: 20px; align-items: flex-start; }
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid var(--cyan);
  display:flex; align-items:center; justify-content:center;
  font-size: 40px; background: var(--bg3);
  flex-shrink: 0; overflow:hidden; position:relative;
}
.profile-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.profile-avatar.npc-profile { border-color: var(--purple); }
.profile-avatar.admin-profile { border-color: var(--pink); }
.profile-stats { display:flex; gap:22px; margin-top: 8px; }
.stat-item { text-align:center; }
.stat-num { font-size: 17px; font-weight: 800; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing:1px; }
.profile-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
.profile-bio { font-size: 13px; color: #b0b0c8; line-height: 1.5; margin-top: 8px; }
.profile-actions { display:flex; gap:10px; margin-top: 14px; flex-wrap: wrap; }
.follow-btn {
  flex:1; background: var(--cyan); color: var(--bg);
  border:none; border-radius: 8px; padding: 9px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  font-family:'Syne',sans-serif; transition: opacity .2s;
}
.follow-btn:hover { opacity:.8; }
.follow-btn.following { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.edit-profile-btn {
  flex:1; background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px; padding: 9px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  font-family:'Syne',sans-serif; transition: border-color .2s;
}
.edit-profile-btn:hover { border-color: var(--cyan); }
.profile-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 2px;
  margin-top: 2px;
}
.grid-cell {
  aspect-ratio: 1/1; background: var(--bg3);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; overflow:hidden; position:relative;
  background-size:cover; background-position:center;
}
.grid-cell-inner { font-size: 22px; opacity:.5; }
.grid-cell:hover::after {
  content:''; position:absolute; inset:0;
  background: rgba(0,255,229,.1);
}

/* ADMIN */
.admin-section {
  padding: 14px 18px; border-bottom: 1px solid var(--border2);
}
.admin-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--pink); font-family:'Space Mono',monospace;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.admin-row { display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.admin-input {
  flex:1; min-width: 120px; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 12px;
  color: var(--text); font-size: 12px; font-family:'Space Mono',monospace;
  outline: none; transition: border-color .2s;
}
.admin-input:focus { border-color: var(--pink); }
.admin-input::placeholder { color: var(--muted); }
.btn-danger {
  background: rgba(255,61,127,.15); color: var(--pink);
  border: 1px solid rgba(255,61,127,.3); border-radius: 6px;
  padding: 8px 14px; font-weight: 700; font-size: 12px; cursor: pointer;
  font-family:'Space Mono',monospace; transition: background .2s;
}
.btn-danger:hover { background: rgba(255,61,127,.25); }
.btn-warn {
  background: rgba(245,196,0,.1); color: var(--yellow);
  border: 1px solid rgba(245,196,0,.3); border-radius: 6px;
  padding: 8px 14px; font-weight: 700; font-size: 12px; cursor: pointer;
  font-family:'Space Mono',monospace; transition: background .2s;
}
.btn-warn:hover { background: rgba(245,196,0,.2); }
.btn-sys {
  background: rgba(0,255,229,.1); color: var(--cyan);
  border: 1px solid rgba(0,255,229,.25); border-radius: 6px;
  padding: 8px 14px; font-weight: 700; font-size: 12px; cursor: pointer;
  font-family:'Space Mono',monospace; transition: background .2s;
}
.btn-sys:hover { background: rgba(0,255,229,.2); }
.user-list-table { margin-top: 12px; }
.user-list-row {
  display:flex; align-items:center; gap:10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 12px; font-family:'Space Mono',monospace;
}
.user-list-row .uname { flex:1; color: var(--text); }
.user-list-row .role-tag { color: var(--muted); font-size: 10px; }

/* LOGIN */
.login-screen {
  min-height: 100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 40px 24px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,255,229,0.06) 0%, transparent 60%);
}
.login-logo {
  font-family:'Space Mono',monospace; font-size: 3rem; font-weight: 700;
  background: linear-gradient(120deg, var(--cyan), var(--purple), var(--pink));
  -webkit-background-clip: text; background-clip: text; color:transparent;
  margin-bottom: 6px; letter-spacing:-2px;
}

<script type="module">
// ============================================================
//  CONFIGURAÇÕES — edite aqui
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDb54T-nItuMSnf1vXlOhePK1CnD5cwFdQ",

  databaseURL: "https://bubble-4156c-default-rtdb.firebaseio.com",

  appId: "1:385246065949:web:a4f9cd4337cbf0a7bd9df4",
  measurementId: "G-TKRWZEDFE0"
};
const CLOUDINARY_CLOUD  = "dd2mltlsb";
const CLOUDINARY_PRESET = "bubble_unsigned"; // crie este preset unsigned no Cloudinary
const GHITUBE_ORIGIN    = "";                // ex: "https://ghitube.vercel.app" ou "" para desativar

// ============================================================
//  FIREBASE IMPORTS (via CDN ESM)
// ============================================================
import { initializeApp }                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged }               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, push,
         update, remove, onValue, off,
         serverTimestamp, query, orderByChild,
         limitToLast }                      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseApp = initializeApp(FIREBASE_CONFIG);
const auth        = getAuth(firebaseApp);
const rtdb        = getDatabase(firebaseApp);

// ============================================================
//  ESTADO GLOBAL
// ============================================================
let currentUser     = null;   // objeto do perfil (rtdb /users/{uid})
let currentView     = 'feed';
let activeConvId    = null;
let profileViewId   = null;
let openOptionsPostId = null;
let fbOnline        = false;

// cache local (preenchido pelos listeners)
let cacheUsers  = {};   // uid → perfil
let cachePosts  = {};   // postId → post
let cacheComments = {}; // postId → {cid: comment}
let cacheLikes    = {}; // postId → {uid: true}
let cacheNotifs   = []; // array para o usuário corrente
let cacheConvs    = {}; // convId → conv
let cacheMsgs     = {}; // convId → {msgId: msg}

const AVATARS = ['✨','👾','🤖','🧬','🦾','👁️','🌀','💎','🔮','🧿','🌐','⚡','🫧','🎮','🕹️','🔥','🌙','🐉'];

// listeners ativos para cancelar ao fazer logout
let _unsubs = [];
function clearListeners() { _unsubs.forEach(fn => fn && fn()); _unsubs = []; }

// ============================================================
//  HELPERS
// ============================================================
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function colorHashtags(txt) {
  return esc(txt).replace(/#([\wÀ-ÿ]+)/g, '<span class="hashtag">#$1</span>');
}
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return 'agora';
  const m = Math.floor(s/60); if (m<60) return m+'min';
  const h = Math.floor(m/60); if (h<24) return h+'h';
  const d = Math.floor(h/24); if (d<30) return d+'d';
  return Math.floor(d/30)+'m';
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
function getUserById(uid) { return cacheUsers[uid] || null; }
function postsArray() {
  return Object.values(cachePosts).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
}
function getLikesCount(pid)         { return Object.keys(cacheLikes[pid]||{}).length; }
function userLikedPost(uid, pid)    { return !!(cacheLikes[pid] && cacheLikes[pid][uid]); }
function getCommentsByPost(pid)     {
  return Object.values(cacheComments[pid]||{}).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));
}
function getTrendingHashtags() {
  let freq = new Map();
  postsArray().forEach(p => {
    (p.content.match(/#[\wÀ-ÿ]+/g)||[]).forEach(t => freq.set(t,(freq.get(t)||0)+1));
  });
  return Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).slice(0,8);
}
function unreadCount() {
  return currentUser ? cacheNotifs.filter(n => n.userId===currentUser.uid && !n.read).length : 0;
}
function isGhiTubeUrl(url) {
  if (!GHITUBE_ORIGIN || !url) return false;
  return url.startsWith(GHITUBE_ORIGIN);
}

// ============================================================
//  CLOUDINARY UPLOAD
// ============================================================
async function uploadToCloudinary(file, onProgress) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
    xhr.upload.onprogress = e => { if (e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (data.secure_url) resolve(data.secure_url);
        else reject(new Error(data.error?.message || 'Upload falhou'));
      } catch(e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error('Erro de rede no upload'));
    xhr.send(fd);
  });
}

// ============================================================
//  FIREBASE REALTIME DATABASE — helpers
// ============================================================
async function fbSet(path, data)       { return set(ref(rtdb, path), data); }
async function fbUpdate(path, data)    { return update(ref(rtdb, path), data); }
async function fbPush(path, data)      { return push(ref(rtdb, path), data); }
async function fbRemove(path)          { return remove(ref(rtdb, path)); }
async function fbGet(path)             { const s = await get(ref(rtdb,path)); return s.exists() ? s.val() : null; }

function fbListen(path, cb) {
  const r = ref(rtdb, path);
  onValue(r, snap => cb(snap.exists() ? snap.val() : null));
  return () => off(r);
}

// ============================================================
//  LISTENERS (tempo real)
// ============================================================
function attachListeners() {
  clearListeners();

  // Usuários
  _unsubs.push(fbListen('users', val => {
    cacheUsers = val || {};
    // atualiza currentUser com dados frescos
    if (currentUser && cacheUsers[currentUser.uid]) {
      currentUser = { ...currentUser, ...cacheUsers[currentUser.uid] };
    }
    softRender();
  }));

  // Posts
  _unsubs.push(fbListen('posts', val => {
    cachePosts = val || {};
    softRender();
  }));

  // Likes
  _unsubs.push(fbListen('likes', val => {
    cacheLikes = val || {};
    softRender();
  }));

  // Comments
  _unsubs.push(fbListen('comments', val => {
    cacheComments = val || {};
    softRender();
  }));

  // Notifications para o user corrente
  if (currentUser) {
    _unsubs.push(fbListen('notifications', val => {
      if (!val) { cacheNotifs = []; }
      else {
        cacheNotifs = Object.entries(val)
          .map(([id,n]) => ({...n, id}))
          .filter(n => n.userId === currentUser.uid)
          .sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
      }
      // atualiza badge sem full render
      const badge = document.querySelector('#hdr-notif .badge');
      const uc = unreadCount();
      if (badge) { badge.textContent = uc; if (!uc) badge.remove(); }
      else if (uc) {
        const btn = document.getElementById('hdr-notif');
        if (btn) btn.insertAdjacentHTML('beforeend', `<span class="badge">${uc}</span>`);
      }
    }));

    // Conversations
    _unsubs.push(fbListen('conversations', val => {
      cacheConvs = val || {};
      if (currentView === 'messages') softRender();
    }));

    // Messages
    _unsubs.push(fbListen('messages', val => {
      cacheMsgs = val || {};
      if (currentView === 'messages' && activeConvId) {
        renderChatMessages(activeConvId);
      }
    }));
  }
}

let _softRenderTimer = null;
function softRender() {
  if (!currentUser) return;
  clearTimeout(_softRenderTimer);
  _softRenderTimer = setTimeout(() => render(), 80);
}

// ============================================================
//  AUTH
// ============================================================
// Gera email interno invisível ao usuário: username@bubble.internal
function fakeEmail(username) {
  return username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@bubble.internal';
}

async function login(username, pass) {
  if (!username || !pass) return false;
  try {
    const email = fakeEmail(username);
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const profile = await fbGet(`users/${cred.user.uid}`);
    if (!profile) { await signOut(auth); return false; }
    currentUser = { uid: cred.user.uid, ...profile };
    currentView = 'feed';
    attachListeners();
    render();
    return true;
  } catch(e) { return false; }
}

async function register(username, pass) {
  if (!username || !pass) return 'fill';
  if (pass.length < 6) return 'shortpass';
  // Verifica se username já existe
  const users = await fbGet('users');
  if (users && Object.values(users).some(u => u.username === username)) return 'exists';
  const email = fakeEmail(username);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;
    const profile = {
      uid, username,
      bio: '', avatar: '✨', role: 'user', isNPC: false,
      followers: {}, following: {},
      createdAt: new Date().toISOString()
    };
    await fbSet(`users/${uid}`, profile);
    currentUser = profile;
    currentView = 'feed';
    attachListeners();
    render();
    return 'ok';
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') return 'exists';
    return 'error';
  }
}

async function logout() {
  clearListeners();
  await signOut(auth);
  currentUser = null;
  currentView = 'feed';
  cacheUsers = {}; cachePosts = {}; cacheComments = {};
  cacheLikes = {}; cacheNotifs = []; cacheConvs = {}; cacheMsgs = {};
  render();
}

// ============================================================
//  ACTIONS
// ============================================================
async function createPost(content, imageUrl='', visibility='public', hiddenContent='', ghiTube=false) {
  if (!currentUser || !content.trim()) return;
  const postRef = push(ref(rtdb, 'posts'));
  await set(postRef, {
    id: postRef.key,
    authorId: currentUser.uid,
    content: content.trim(),
    imageUrl: imageUrl || '',
    timestamp: new Date().toISOString(),
    visibility,
    hiddenContent: hiddenContent || null,
    isEvent: false,
    edited: false,
    ghiTube: ghiTube || false
  });
  closeModal();
  currentView = 'feed';
  render();
  toast('Post publicado!');
}

async function deletePost(pid) {
  const post = cachePosts[pid];
  if (!post) return;
  if (currentUser.role !== 'admin' && post.authorId !== currentUser.uid) return;
  await fbRemove(`posts/${pid}`);
  await fbRemove(`comments/${pid}`);
  await fbRemove(`likes/${pid}`);
  openOptionsPostId = null;
  render();
  toast('Post removido.');
}

async function editPost(pid, newContent, newImg, newHidden) {
  const post = cachePosts[pid];
  if (!post) return;
  if (currentUser.role !== 'admin' && post.authorId !== currentUser.uid) return;
  const updates = { edited: true };
  if (newContent) updates.content = newContent;
  if (newImg !== undefined) updates.imageUrl = newImg;
  if (newHidden !== undefined) updates.hiddenContent = newHidden || null;
  await fbUpdate(`posts/${pid}`, updates);
  closeModal();
  render();
  toast('Post editado.');
}

async function toggleLike(pid) {
  if (!currentUser) return;
  const uid = currentUser.uid;
  const already = userLikedPost(uid, pid);
  if (already) {
    await fbRemove(`likes/${pid}/${uid}`);
  } else {
    await fbSet(`likes/${pid}/${uid}`, true);
    const post = cachePosts[pid];
    if (post && post.authorId !== uid) {
      await createNotification(post.authorId, 'like', uid, pid);
    }
  }
  // Optimistic UI update
  if (!cacheLikes[pid]) cacheLikes[pid] = {};
  if (already) delete cacheLikes[pid][uid];
  else cacheLikes[pid][uid] = true;
  const btn = document.querySelector(`.like-btn[data-post="${pid}"]`);
  const cnt = document.querySelector(`.like-count[data-post="${pid}"]`);
  if (btn) {
    const liked = userLikedPost(uid, pid);
    btn.className = 'act-btn like-btn' + (liked ? ' liked' : '');
    btn.querySelector('i').className = liked ? 'fas fa-heart' : 'far fa-heart';
    if (cnt) cnt.textContent = getLikesCount(pid);
  }
}

async function addComment(pid, text) {
  if (!currentUser || !text.trim()) return;
  const cmtRef = push(ref(rtdb, `comments/${pid}`));
  await set(cmtRef, {
    id: cmtRef.key,
    postId: pid,
    authorId: currentUser.uid,
    content: text.trim(),
    timestamp: new Date().toISOString()
  });
  const post = cachePosts[pid];
  if (post && post.authorId !== currentUser.uid) {
    await createNotification(post.authorId, 'comment', currentUser.uid, pid);
  }
  // re-render comments section
  if (!cacheComments[pid]) cacheComments[pid] = {};
  cacheComments[pid][cmtRef.key] = { id:cmtRef.key, postId:pid, authorId:currentUser.uid, content:text.trim(), timestamp:new Date().toISOString() };
  const sec = document.getElementById('cmts-'+pid);
  if (sec) sec.innerHTML = renderCommentsInner(pid, getCommentsByPost(pid), true);
}

async function followUser(targetId) {
  if (!currentUser || currentUser.uid === targetId) return;
  const isF = cacheUsers[currentUser.uid]?.following?.[targetId];
  if (isF) {
    await fbRemove(`users/${currentUser.uid}/following/${targetId}`);
    await fbRemove(`users/${targetId}/followers/${currentUser.uid}`);
    toast('Deixou de seguir.');
  } else {
    await fbSet(`users/${currentUser.uid}/following/${targetId}`, true);
    await fbSet(`users/${targetId}/followers/${currentUser.uid}`, true);
    toast('Seguindo!');
  }
  render();
}

async function sendMessage(receiverId, content) {
  if (!currentUser || !content.trim()) return;
  // find or create conversation
  let convId = null;
  for (const [cid, conv] of Object.entries(cacheConvs)) {
    if (conv.participants && conv.participants[currentUser.uid] && conv.participants[receiverId]) {
      convId = cid; break;
    }
  }
  if (!convId) {
    const convRef = push(ref(rtdb, 'conversations'));
    convId = convRef.key;
    await set(convRef, {
      id: convId,
      participants: { [currentUser.uid]: true, [receiverId]: true },
      lastUpdated: new Date().toISOString()
    });
  }
  const msgRef = push(ref(rtdb, `messages/${convId}`));
  await set(msgRef, {
    id: msgRef.key,
    conversationId: convId,
    senderId: currentUser.uid,
    content: content.trim(),
    timestamp: new Date().toISOString()
  });
  await fbUpdate(`conversations/${convId}`, { lastUpdated: new Date().toISOString() });
  renderChatMessages(convId);
}

async function startConvWithUser(targetId) {
  let convId = null;
  for (const [cid, conv] of Object.entries(cacheConvs)) {
    if (conv.participants?.[currentUser.uid] && conv.participants?.[targetId]) {
      convId = cid; break;
    }
  }
  if (!convId) {
    const convRef = push(ref(rtdb, 'conversations'));
    convId = convRef.key;
    await set(convRef, {
      id: convId,
      participants: { [currentUser.uid]: true, [targetId]: true },
      lastUpdated: new Date().toISOString()
    });
  }
  activeConvId = convId;
  currentView = 'messages';
  render();
}

async function createNotification(userId, type, fromId, postId) {
  if (userId === fromId) return;
  const nRef = push(ref(rtdb, 'notifications'));
  await set(nRef, {
    id: nRef.key,
    userId, type, fromUserId: fromId,
    postId: postId || null,
    read: false,
    timestamp: new Date().toISOString()
  });
}

// NPC / ADMIN
async function createNPC(username, password, bio) {
  if (!currentUser || currentUser.role !== 'admin' || !username || !password) return false;
  const users = await fbGet('users');
  if (users && Object.values(users).some(u => u.username === username)) return false;
  try {
    const email = fakeEmail(username);
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await fbSet(`users/${cred.user.uid}`, {
      uid: cred.user.uid, username,
      bio: bio||'NPC do sistema.', avatar:'🧬',
      role:'user', isNPC:true,
      followers:{}, following:{},
      createdAt: new Date().toISOString()
    });
    return true;
  } catch(e) { return false; }
}

async function createSystemPost(content) {
  if (currentUser?.role !== 'admin' || !content) return;
  const postRef = push(ref(rtdb, 'posts'));
  await set(postRef, {
    id: postRef.key,
    authorId: currentUser.uid,
    content: `⚡ SISTEMA: ${content}`,
    imageUrl: '',
    timestamp: new Date().toISOString(),
    visibility: 'public',
    hiddenContent: null,
    isEvent: true,
    edited: false
  });
  currentView = 'feed';
  render();
  toast('Post do sistema criado!');
}

async function adminEditPost(pid, newContent, newImg, newTs, newHidden) {
  if (!cachePosts[pid]) return false;
  const updates = { edited: true };
  if (newContent) updates.content = newContent;
  if (newImg !== undefined) updates.imageUrl = newImg;
  if (newTs) updates.timestamp = newTs;
  if (newHidden !== undefined) updates.hiddenContent = newHidden || null;
  await fbUpdate(`posts/${pid}`, updates);
  render();
  return true;
}

async function markNotifsRead() {
  const updates = {};
  cacheNotifs.filter(n => !n.read).forEach(n => {
    updates[`notifications/${n.id}/read`] = true;
  });
  if (Object.keys(updates).length) await update(ref(rtdb), updates);
  cacheNotifs.forEach(n => n.read = true);
}

async function updateProfile(bio, avatar, photoUrl) {
  const updates = { bio, avatar };
  if (photoUrl) updates.photoUrl = photoUrl;
  await fbUpdate(`users/${currentUser.uid}`, updates);
  currentUser = { ...currentUser, bio, avatar, ...(photoUrl ? {photoUrl} : {}) };
  closeModal();
  render();
  toast('Perfil atualizado!');
}

// ============================================================
//  GHITUBE BRIDGE
// ============================================================
if (GHITUBE_ORIGIN) {
  window.addEventListener('message', async (e) => {
    if (e.origin !== GHITUBE_ORIGIN) return;
    const { type, payload } = e.data || {};

    if (type === 'GHITUBE_VIDEO_SHARED' && currentUser) {
      // payload: { title, thumbnail, videoUrl }
      const content = `🎬 ${payload.title || 'Vídeo GhiTube'} #GhiTube`;
      const imgUrl  = payload.thumbnail || payload.videoUrl || '';
      await createPost(content, imgUrl, 'public', '', true);
      toast('Vídeo GhiTube compartilhado!');
    }

    if (type === 'BUBBLE_USER_REQUEST') {
      e.source.postMessage({
        type: 'BUBBLE_USER',
        payload: currentUser ? {
          uid: currentUser.uid,
          username: currentUser.username,
          avatar: currentUser.avatar
        } : null
      }, GHITUBE_ORIGIN);
    }
  });
}

// ============================================================
function render() {

  if (!app) return;
  if (!currentUser) { app.innerHTML = renderLogin(); attachLoginEvents(); return; }

    const cm = document.getElementById('chatMessages');
    if (cm) cm.scrollTop = cm.scrollHeight;
  }
}

function renderHeader() {
  const uc = unreadCount();
  const prof = cacheUsers[currentUser.uid] || currentUser;
  return `<div class="header">
    <div class="logo">Bubble</div>
    <div class="header-right">
      <span class="fb-status"><span class="fb-dot ${fbOnline?'online':''}"></span>${fbOnline?'live':'offline'}</span>

}

function renderBottomNav() {
  const v = currentView;

    <button class="nav-btn ${v==='search'?'active':''}" data-nav="search"><i class="fas fa-search"></i></button>

}

function renderMain() {
  if (currentView==='feed')          return renderFeed();
  if (currentView==='search')        return renderSearch();
  if (currentView==='trending')      return renderTrending();
  if (currentView==='notifications') return renderNotifications();
  if (currentView==='messages')      return renderMessages();

// STORIES
function renderStories() {
  const me = cacheUsers[currentUser.uid] || currentUser;
  const following = me.following || {};
  const users = Object.values(cacheUsers).filter(u => u.uid !== currentUser.uid && following[u.uid]).slice(0,12);
  return `<div class="stories-wrap">
    ${users.map(u=>`<div class="story-item" data-view-profile="${u.uid}">
      <div class="story-ring"><div class="story-inner">${u.photoUrl?`<img src="${esc(u.photoUrl)}" loading="lazy">`:(u.avatar||u.username?.[0]||'?')}</div></div>
      <div class="story-name">${esc(u.username)}</div>
    </div>`).join('')}
  </div>`;
}

// FEED
function renderFeed() {
  const uid = currentUser.uid;
  const me = cacheUsers[uid] || currentUser;
  const following = me.following || {};
  const isAdmin = currentUser.role === 'admin';
  const visible = postsArray().filter(p => {
    if (isAdmin) return true;
    if (p.authorId === uid) return true;
    if (!following[p.authorId]) return false;
    return p.visibility === 'public' || p.visibility === 'specific' || p.visibility === 'private';
  });
  return renderStories() + (visible.length
    ? visible.map(renderPost).join('')
    : `<div class="empty-state"><i class="fas fa-satellite-dish"></i><p>Nenhum sinal detectado.<br>Seja o primeiro a transmitir.</p></div>`);
}

function renderPost(post) {
  const author = getUserById(post.authorId);
  if (!author) return '';
  const likeCount = getLikesCount(post.id);
  const liked     = userLikedPost(currentUser.uid, post.id);
  const comments  = getCommentsByPost(post.id);
  const canEdit   = currentUser.role==='admin' || post.authorId===currentUser.uid;
  let cls = 'post';
  if (post.isEvent) cls += ' event-post';
  if (post.visibility !== 'public') cls += ' system-post';
  let avatarCls = 'avatar';
  if (author.isNPC && currentUser.role==='admin') avatarCls += ' npc-ring';
  if (author.role==='admin') avatarCls += ' admin-ring';

  const avatarInner = author.photoUrl
    ? `<img src="${esc(author.photoUrl)}" loading="lazy">`
    : (author.avatar || author.username?.[0] || '?');

  let mediaHtml = '';
  if (post.imageUrl) {
    if (isGhiTubeUrl(post.imageUrl)) {
      mediaHtml = `<div class="post-image"><iframe src="${esc(post.imageUrl)}" allowfullscreen></iframe></div>`;
    } else {
      mediaHtml = `<div class="post-image"><img src="${esc(post.imageUrl)}" loading="lazy"></div>`;
    }
  } else {
    mediaHtml = `<div class="post-no-image">${colorHashtags(post.content)}</div>`;
  }

  return `<div class="${cls}" data-post-id="${post.id}" style="position:relative;">
    ${post.isEvent?`<div class="event-alert"><i class="fas fa-bolt"></i> EVENTO DO SISTEMA</div>`:''}
    <div class="post-header">
      <div class="${avatarCls}" data-view-profile="${author.uid}">${avatarInner}</div>
      <div class="post-meta">
        <div class="post-author">
          <span data-view-profile="${author.uid}" style="cursor:pointer;">${esc(author.username)}</span>
          ${author.isNPC && currentUser.role==='admin'?'<span class="badge-tag badge-npc">NPC</span>':''}
          ${author.role==='admin'?'<span class="badge-tag badge-admin">GM</span>':''}
          ${post.ghiTube?'<span class="badge-tag badge-ghitube">GhiTube</span>':''}
          ${post.visibility==='private'?'<span class="badge-tag badge-sys">PRIV</span>':''}
          ${post.visibility==='specific'?'<span class="badge-tag badge-sys">RESTRITO</span>':''}
          ${post.edited?'<span class="edited-tag">editado</span>':''}
        </div>
        <div class="post-time">${timeAgo(post.timestamp)}</div>
      </div>
      ${canEdit?`<button class="post-options-btn" data-options="${post.id}"><i class="fas fa-ellipsis-h"></i></button>`:''}
    </div>
    ${openOptionsPostId===post.id ? renderOptionsMenu(post) : ''}
    ${mediaHtml}
    <div class="post-actions">
      <button class="act-btn like-btn ${liked?'liked':''}" data-post="${post.id}">
        <i class="${liked?'fas':'far'} fa-heart"></i>
        <span class="act-count like-count" data-post="${post.id}">${likeCount}</span>
      </button>
      <button class="act-btn" data-toggle-comments="${post.id}">
        <i class="far fa-comment"></i>
        <span class="act-count">${comments.length}</span>
      </button>
      <button class="act-btn" data-share="${post.id}" style="margin-left:auto;">
        <i class="far fa-paper-plane"></i>
      </button>
    </div>
    ${post.imageUrl?`<div class="post-body"><span class="caption"><span class="uname">${esc(author.username)}</span>${colorHashtags(post.content)}</span></div>`:''}
    ${post.hiddenContent?`<div class="post-body"><span class="hidden-hint" data-reveal="${post.id}">🔮 Conteúdo oculto — clique para revelar</span></div>`:''}
    <div class="comments-section" id="cmts-${post.id}">${renderCommentsInner(post.id, comments, false)}</div>
    <div class="add-comment-row">
      <input class="comment-input-field" data-post="${post.id}" placeholder="Adicione um comentário..." />
      <button class="post-comment-btn" data-post="${post.id}">Publicar</button>
    </div>
  </div>`;
}

function renderCommentsInner(pid, comments, showAll) {
  const shown = showAll ? comments : comments.slice(0,2);
  return `${!showAll && comments.length>2 ? `<span class="see-all-comments" data-all-comments="${pid}">Ver todos os ${comments.length} comentários</span>` : ''}
    ${shown.map(c => {
      const au = getUserById(c.authorId);
      return `<div class="comment-item"><span class="uname">${esc(au?.username||'?')}</span><span>${esc(c.content)}</span></div>`;
    }).join('')}`;
}

function renderOptionsMenu(post) {
  const isAdmin = currentUser.role==='admin';
  return `<div class="options-menu">
    <button class="opt-item" data-edit-post="${post.id}"><i class="fas fa-pen" style="width:16px;color:var(--cyan)"></i> Editar</button>
    <button class="opt-item danger" data-delete-post="${post.id}"><i class="fas fa-trash" style="width:16px;"></i> Deletar</button>
    ${isAdmin?`<button class="opt-item" data-toggle-visibility="${post.id}"><i class="fas fa-eye-slash" style="width:16px;color:var(--muted)"></i> Visibilidade</button>`:''}
  </div>`;
}

// SEARCH
function renderSearch(results=null) {
  return `<div class="page">
    <div class="page-title"><i class="fas fa-search"></i> Buscar</div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Pesquisar usuários e posts..." />
      <button class="btn-primary" id="doSearch">Buscar</button>
    </div>
    <div id="searchResults">
      ${results ? renderSearchResults(results) : `<div class="empty-state" style="padding:40px 24px;"><i class="fas fa-satellite-dish"></i><p>Digite para iniciar a busca na rede.</p></div>`}
    </div>
  </div>`;
}
function doSearch() {
  const term = document.getElementById('searchInput')?.value.toLowerCase().trim();
  if (!term) return;
  const users = Object.values(cacheUsers).filter(u => u.username?.toLowerCase().includes(term) || u.bio?.toLowerCase().includes(term));
  const posts = postsArray().filter(p => p.content?.toLowerCase().includes(term) && (p.visibility==='public' || p.authorId===currentUser.uid));
  document.getElementById('searchResults').innerHTML = renderSearchResults({users,posts});
  attachSearchResultEvents();
}
function renderSearchResults({users,posts}) {
  let html = '';
  if (users.length) {
    html += `<div class="result-group"><div class="result-label">Usuários</div>`;
    html += users.map(u=>`<div class="result-user" data-view-profile="${u.uid}">
      <div class="avatar ${u.isNPC && currentUser.role==='admin'?'npc-ring':''}" style="width:36px;height:36px;font-size:18px;">${u.photoUrl?`<img src="${esc(u.photoUrl)}">`:(u.avatar||u.username?.[0])}</div>
      <div><div style="font-size:13px;font-weight:700;">${esc(u.username)} ${u.isNPC && currentUser.role==='admin'?'<span class="badge-tag badge-npc">NPC</span>':''}</div>
      <div style="font-size:11px;color:var(--muted);">${esc(u.bio||'')}</div></div>
    </div>`).join('');
    html += '</div>';
  }
  if (posts.length) {
    html += `<div class="result-group"><div class="result-label">Posts</div>`;
    html += posts.map(p => {
      const au = getUserById(p.authorId);
      return `<div class="result-post"><strong>${esc(au?.username||'?')} · ${timeAgo(p.timestamp)}</strong>${esc(p.content.slice(0,120))}${p.content.length>120?'…':''}</div>`;
    }).join('');
    html += '</div>';
  }
  if (!users.length && !posts.length) return `<div class="empty-state" style="padding:40px 24px;"><i class="fas fa-satellite-dish"></i><p>Nenhum resultado encontrado.</p></div>`;
  return html;
}

// MESSAGES
function renderMessages() {
  if (activeConvId) return renderChat(activeConvId);
  const convs = Object.values(cacheConvs)
    .filter(c => c.participants?.[currentUser.uid])
    .sort((a,b) => new Date(b.lastUpdated)-new Date(a.lastUpdated));
  const otherUsers = Object.values(cacheUsers).filter(u => u.uid !== currentUser.uid);
  return `<div class="page">
    <div class="page-title"><i class="fas fa-ghost"></i> Whispers</div>
    <div class="conv-list">
      ${convs.map(c => {
        const otherId = Object.keys(c.participants||{}).find(id => id!==currentUser.uid);
        const other = getUserById(otherId);
        const msgs = Object.values(cacheMsgs[c.id]||{}).sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));

        return `<div class="conv-item" data-open-conv="${c.id}">

          <div style="flex:1;min-width:0;">
            <div class="conv-name">${esc(other?.username||'Desconhecido')}</div>
            <div class="conv-preview">${lastMsg?esc(lastMsg.content.slice(0,50))+'…':'Sem mensagens'}</div>

      <div class="result-label" style="margin-bottom:10px;">Selecionar usuário</div>
      ${otherUsers.map(u=>`<div class="result-user" data-start-conv="${u.uid}">
        <div class="avatar" style="width:32px;height:32px;font-size:16px;">${u.photoUrl?`<img src="${esc(u.photoUrl)}">`:(u.avatar||u.username?.[0])}</div>
        <div style="font-size:13px;font-weight:700;">${esc(u.username)}</div>
      </div>`).join('')}
    </div>

function renderChat(convId) {
  const conv = cacheConvs[convId];
  if (!conv) return renderMessages();
  const otherId = Object.keys(conv.participants||{}).find(id => id!==currentUser.uid);
  const other = getUserById(otherId);
  const msgs = Object.values(cacheMsgs[convId]||{}).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  return `<div class="chat-area">
    <div class="chat-header">
      <button class="chat-back" id="chatBack"><i class="fas fa-chevron-left"></i></button>
      <div class="avatar ${other?.isNPC && currentUser.role==='admin'?'npc-ring':''}" style="width:36px;height:36px;font-size:20px;">${other?.photoUrl?`<img src="${esc(other.photoUrl)}">`:(other?.avatar||'?')}</div>
      <div><div class="conv-name">${esc(other?.username||'?')}</div>${other?.isNPC && currentUser.role==='admin'?'<span class="badge-tag badge-npc" style="font-size:8px;">NPC</span>':''}</div>
    </div>
    <div class="chat-messages" id="chatMessages">
      ${msgs.map(m=>`<div>
        <div class="msg-bubble ${m.senderId===currentUser.uid?'sent':'recv'}">${esc(m.content)}</div>
        <div class="msg-time" style="text-align:${m.senderId===currentUser.uid?'right':'left'}">${timeAgo(m.timestamp)}</div>
      </div>`).join('')}
    </div>
    <div class="chat-input-row">
      <input class="chat-text-input" id="chatInput" placeholder="Enviar mensagem criptografada..." />
      <button class="send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>`;
}

function renderChatMessages(convId) {
  const cm = document.getElementById('chatMessages');
  if (!cm) return;
  const msgs = Object.values(cacheMsgs[convId]||{}).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  cm.innerHTML = msgs.map(m=>`<div>
    <div class="msg-bubble ${m.senderId===currentUser.uid?'sent':'recv'}">${esc(m.content)}</div>
    <div class="msg-time" style="text-align:${m.senderId===currentUser.uid?'right':'left'}">${timeAgo(m.timestamp)}</div>
  </div>`).join('');
  cm.scrollTop = cm.scrollHeight;
}

// PROFILE
function renderProfile(userId) {
  const user = getUserById(userId) || (currentUser.uid===userId ? currentUser : null);
  if (!user) return `<div class="empty-state"><i class="fas fa-user-slash"></i><p>Usuário não encontrado.</p></div>`;
  const posts = postsArray().filter(p => p.authorId === userId);
  const isOwn = currentUser.uid === userId;
  const isFollowing = !!(cacheUsers[currentUser.uid]?.following?.[userId]);
  let avCls = 'profile-avatar';
  if (user.isNPC && currentUser.role==='admin') avCls += ' npc-profile';
  if (user.role==='admin') avCls += ' admin-profile';
  const avatarInner = user.photoUrl ? `<img src="${esc(user.photoUrl)}">` : (user.avatar || user.username?.[0] || '?');

  return `<div class="page">
    <div class="profile-hero">
      <div class="profile-top">
        <div class="${avCls}">${avatarInner}</div>
        <div style="flex:1;">

function showNewPostModal() {
  let selectedVis = 'public';
  const html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">+ Novo Post</div>
      <textarea class="modal-textarea" id="newPostContent" placeholder="O que está acontecendo na rede?..."></textarea>

      <div class="upload-area" id="uploadArea">

        <input type="file" id="imgFileInput" accept="image/*" style="display:none">
      </div>
      <div class="upload-progress" id="uploadProgress"><div class="upload-progress-bar" id="uploadBar"></div></div>
      <img class="upload-preview" id="uploadPreview">
      <input class="modal-input" id="newPostImg" placeholder="ou cole uma URL de imagem">

      <div class="visibility-row">
        <button class="vis-btn selected" data-vis="public">🌐 Público</button>
        <button class="vis-btn" data-vis="private">🔒 Privado</button>
        <button class="vis-btn" data-vis="specific">👁️ Restrito</button>

        <button class="modal-cancel" id="cancelPost">Cancelar</button>
        <button class="modal-publish" id="confirmPost">Publicar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);

  // Upload area click
  document.getElementById('uploadArea').onclick = () => document.getElementById('imgFileInput').click();
  document.getElementById('imgFileInput').onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    const prog = document.getElementById('uploadProgress');
    const bar  = document.getElementById('uploadBar');
    const prev = document.getElementById('uploadPreview');
    const pub  = document.getElementById('confirmPost');
    prog.style.display = 'block'; pub.disabled = true;
    try {
      const url = await uploadToCloudinary(file, pct => { bar.style.width = pct+'%'; });
      document.getElementById('newPostImg').value = url;
      prev.src = url; prev.style.display = 'block';
      toast('Imagem enviada!');
    } catch(err) { toast('Erro no upload: ' + err.message); }
    prog.style.display = 'none'; pub.disabled = false;
  };

  document.getElementById('cancelPost').onclick = closeModal;
  document.getElementById('confirmPost').onclick = () => {
    const c      = document.getElementById('newPostContent').value;
    const img    = document.getElementById('newPostImg').value;
    const hidden = document.getElementById('newPostHidden').value;
    createPost(c, img, selectedVis, hidden);
  };
  document.querySelectorAll('.vis-btn').forEach(btn => {
    btn.onclick = () => {
      selectedVis = btn.dataset.vis;
      document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });
  document.getElementById('modalOverlay').onclick = e => { if (e.target.id==='modalOverlay') closeModal(); };
}

function attachLoginEvents() {
  document.getElementById('loginBtn')?.addEventListener('click', async () => {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const btn = document.getElementById('loginBtn');
    btn.textContent = '...'; btn.disabled = true;
    const ok = await login(u, p);
    if (!ok) {
      const e = document.getElementById('loginError');
      e.textContent = 'Usuário ou senha incorretos.'; e.style.display = 'block';
      btn.textContent = 'CONECTAR'; btn.disabled = false;
    }
  });
  document.getElementById('loginPass')?.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('loginBtn').click(); });
  document.getElementById('regBtn')?.addEventListener('click', async () => {
    const u = document.getElementById('regUser').value.trim();
    const p = document.getElementById('regPass').value;
    const btn = document.getElementById('regBtn');
    btn.textContent = '...'; btn.disabled = true;
    const res = await register(u, p);
    if (res === 'exists')    { showRegErr('Username já existe.'); btn.textContent='CRIAR ACESSO'; btn.disabled=false; }
    else if (res === 'fill') { showRegErr('Preencha todos os campos.'); btn.textContent='CRIAR ACESSO'; btn.disabled=false; }
    else if (res === 'shortpass') { showRegErr('Senha precisa ter pelo menos 6 caracteres.'); btn.textContent='CRIAR ACESSO'; btn.disabled=false; }
    else if (res === 'error') { showRegErr('Erro ao criar conta. Tente outro username.'); btn.textContent='CRIAR ACESSO'; btn.disabled=false; }
  });
  function showRegErr(msg) { const e=document.getElementById('regError'); e.textContent=msg; e.style.display='block'; }
}

    btn.addEventListener('click', () => {
      _npcSwitchUsername = btn.dataset.npcUser;
      const panel = document.getElementById('npcSwitchPanel');
      const nameEl = document.getElementById('npcSwitchName');
      const errEl = document.getElementById('npcSwitchError');
      const passEl = document.getElementById('npcSwitchPass');
      if (panel) panel.style.display = 'block';
      if (nameEl) nameEl.textContent = _npcSwitchUsername;
      if (errEl) errEl.style.display = 'none';
      if (passEl) { passEl.value = ''; passEl.focus(); }
    });
  });
  document.getElementById('npcSwitchCancel')?.addEventListener('click', () => {
    const panel = document.getElementById('npcSwitchPanel');
    if (panel) panel.style.display = 'none';
    _npcSwitchUsername = null;
  });
  document.getElementById('npcSwitchConfirm')?.addEventListener('click', async () => {
    if (!_npcSwitchUsername) return;
    const pass = document.getElementById('npcSwitchPass')?.value;
    const errEl = document.getElementById('npcSwitchError');
    const email = `${_npcSwitchUsername.toLowerCase().replace(/[^a-z0-9]/g,'')}@npc.bubble`;
    try {
      clearListeners();
      await signOut(auth);
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      const profile = await fbGet(`users/${cred.user.uid}`);
      if (profile) {
        currentUser = { uid: cred.user.uid, ...profile };
        attachListeners();
        currentView = 'feed';
        render();
        toast('Logado como ' + _npcSwitchUsername);
      }
    } catch(e) {
      if (errEl) errEl.style.display = 'block';
    }
  });
  document.getElementById('npcSwitchPass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('npcSwitchConfirm')?.click();
  });

  document.getElementById('createNPCBtn')?.addEventListener('click', async () => {
    const u=document.getElementById('npcUser').value,
          p=document.getElementById('npcPass').value,
          b=document.getElementById('npcBio').value;
    const ok = await createNPC(u,p,b);
    toast(ok ? 'NPC criado: '+u : 'Erro: username já existe ou campos inválidos.');
  });
  document.getElementById('createSystemPostBtn')?.addEventListener('click', () => {
    const m=document.getElementById('systemMsg').value; createSystemPost(m);
  });
  document.getElementById('editPostBtn')?.addEventListener('click', async () => {
    const pid=document.getElementById('editPostId').value;
    const c=document.getElementById('editPostContent').value;
    const img=document.getElementById('editPostImg').value;
    const hidden=document.getElementById('editPostHidden').value;
    let ts=document.getElementById('editPostTs').value;
    if (ts==='agora') ts=new Date().toISOString();
    const ok = await adminEditPost(pid,c,img,ts,hidden);
    toast(ok ? 'Post editado!' : 'ID não encontrado.');
  });
  document.getElementById('delPostBtn')?.addEventListener('click', () => {
    const pid=document.getElementById('delPostId').value; deletePost(pid); toast('Post removido.');
  });
  document.getElementById('listUsersBtn')?.addEventListener('click', () => {
    document.getElementById('userListOutput').innerHTML = Object.values(cacheUsers).map(u=>`
      <div class="user-list-row">
        <span>${u.avatar||'?'}</span>
        <span class="uname">${esc(u.username)}</span>
        <span class="role-tag">${u.role}${u.isNPC?' · NPC':''}</span>
        <span style="font-size:10px;color:var(--muted);">UID:${u.uid?.slice(0,8)}</span>
      </div>`).join('');
  });
  document.getElementById('resetBtn')?.addEventListener('click', async () => {
    if (confirm('Apagar TODOS os dados do Firebase? Irreversível.')) {
      await Promise.all(['posts','comments','likes','notifications','conversations','messages'].map(k => fbRemove(k)));
      toast('Dados apagados.'); currentView='feed'; render();
    }
  });

  document.addEventListener('click', handleOutsideClick, {once:true});
}

function handleOutsideClick(e) {
  if (openOptionsPostId && !e.target.closest('.post-options-btn') && !e.target.closest('.options-menu')) {
    openOptionsPostId = null; render();
  }
}

function attachSearchResultEvents() {
  document.querySelectorAll('[data-view-profile]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); profileViewId=el.dataset.viewProfile; currentView='profile'; openOptionsPostId=null; render(); });
  });
}

// ============================================================
//  INIT — Firebase Auth state observer
// ============================================================
document.getElementById('app').innerHTML = `
  <div class="loading-screen">
    <div class="loading-logo">Bubble</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>`;

// Monitor connection status
onValue(ref(rtdb, '.info/connected'), snap => {
  fbOnline = snap.val() === true;
  const dot = document.querySelector('.fb-dot');
  if (dot) { dot.className = 'fb-dot' + (fbOnline ? ' online' : ''); }
});

onAuthStateChanged(auth, async (firebaseUser) => {
  if (firebaseUser) {
    const profile = await fbGet(`users/${firebaseUser.uid}`);
    if (profile) {
      currentUser = { uid: firebaseUser.uid, ...profile };
      attachListeners();
      render();
    } else {
      // Usuário existe no Auth mas não no DB — faz logout
      await signOut(auth);
      currentUser = null;
      render();
    }
  } else {
    currentUser = null;
    clearListeners();
    render();
  }
});
</script>
</body>
</html>
