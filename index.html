cyan); color: var(--cyan); background: rgba(0,255,229,.08); } .avatar-picker { display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0; } .av-opt { width: 44px; height:44px; border-radius:50%; border: 2px solid transparent; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; background: var(--bg3); transition: border-color .2s; } .av-opt.selected { border-color: var(--cyan); } .av-opt:hover { border-color: var(--muted); } .toast { position:fixed; bottom: 100px; left:50%; transform:translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: 12px; font-family:'Space Mono',monospace; color: var(--cyan); z-index:9999; animation: toastIn .25s ease; white-space: nowrap; pointer-events:none; } @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} } @media(max-width:480px) { .profile-stats { gap: 14px; } .stat-num { font-size:15px; } }

<body>
<div id="app"></div>

<script type="module">
// ==================== FIREBASE IMPORTS ====================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, arrayUnion, arrayRemove, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb54T-nItuMSnf1vXlOhePK1CnD5cwFdQ",
  authDomain: "bubble-4156c.firebaseapp.com",
  databaseURL: "https://bubble-4156c-default-rtdb.firebaseio.com",
  projectId: "bubble-4156c",
  storageBucket: "bubble-4156c.firebasestorage.app",
  messagingSenderId: "385246065949",
  appId: "1:385246065949:web:a4f9cd4337cbf0a7bd9df4",
  measurementId: "G-TKRWZEDFE0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const analytics = getAnalytics(app);

// ==================== VARIÁVEIS GLOBAIS ====================
let currentUser = null;
let currentView = 'feed';
let activeConvId = null;
let profileViewId = null;
let openOptionsPostId = null;

// Listeners
let feedUnsubscribe = null;
let messagesUnsubscribe = null;

const AVATARS = ['✨','👾','🤖','🧬','🦾','👁️','🌀','💎','🔮','🧿','🌐','⚡','🫧','🎮','🕹️','🔥','🌙','🐉'];
let userCache = {}; // id -> userData

// ==================== UTILITÁRIOS ====================
function esc(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorHashtags(txt) { return esc(txt).replace(/#([\wÀ-ÿ]+)/g,'<span class="hashtag">#$1</span>'); }
function timeAgo(date) {
  if (!date) return 'agora';
  let timestamp = date.toDate ? date.toDate() : new Date(date);
  const s = Math.floor((Date.now() - timestamp) / 1000);
  if (s < 60) return 'agora';
  const m = Math.floor(s/60); if (m < 60) return m+'min';
  const h = Math.floor(m/60); if (h < 24) return h+'h';
  const dy = Math.floor(h/24); if (dy < 30) return dy+'d';
  return Math.floor(dy/30)+'m';
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function optimizeCloudinaryUrl(url, width = 600) {
  if (!url || !url.includes('cloudinary.com')) return url;
  return url.replace('/upload/', `/upload/w_${width},c_scale,q_auto,f_auto/`);
}
function getUserData(id) { return userCache[id] || { username: '?', avatar: '?', isNPC: false, role: 'user' }; }

// ==================== AUTH ====================
async function login(email, password) {
  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;
    const userDoc = await getDoc(doc(db, "users", uid));
    if (userDoc.exists()) {
      currentUser = { id: uid, ...userDoc.data() };
    } else {
      const newUser = { username: email.split('@')[0], email, bio: '', avatar: '✨', role: 'user', isNPC: false, followers: [], following: [], createdAt: serverTimestamp() };
      await setDoc(doc(db, "users", uid), newUser);
      currentUser = { id: uid, ...newUser };
    }
    sessionStorage.setItem('bubble_cu', JSON.stringify(currentUser));
    currentView = 'feed';
    render();
    return true;
  } catch (error) { return false; }
}

async function register(username, email, password) {
  if (!username || !email || !password) return 'fill';
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;
    const newUser = { username, email, bio: '', avatar: '✨', role: 'user', isNPC: false, followers: [], following: [], createdAt: serverTimestamp() };
    await setDoc(doc(db, "users", uid), newUser);
    currentUser = { id: uid, ...newUser };
    sessionStorage.setItem('bubble_cu', JSON.stringify(currentUser));
    return 'ok';
  } catch (error) {
    if (error.code === 'auth/email-already-in-use') return 'exists';
    return 'error';
  }
}

async function logout() {
  await signOut(auth);
  currentUser = null;
  sessionStorage.removeItem('bubble_cu');
  if (feedUnsubscribe) feedUnsubscribe();
  if (messagesUnsubscribe) messagesUnsubscribe();
  currentView = 'feed';
  render();
}

// ==================== POSTS ====================
async function createPost(content, imageUrl = '', visibility = 'public', hiddenContent = '') {
  if (!currentUser || !content.trim()) return;
  const postData = {
    authorId: currentUser.id,
    content: content.trim(),
    imageUrl,
    timestamp: serverTimestamp(),
    visibility,
    hiddenContent: hiddenContent || null,
    isEvent: false,
    edited: false
  };
  await addDoc(collection(db, "posts"), postData);
  closeModal();
  currentView = 'feed';
  toast('Post publicado!');
}

async function deletePost(postId) {
  const postRef = doc(db, "posts", postId);
  const postSnap = await getDoc(postRef);
  if (!postSnap.exists()) return;
  const post = postSnap.data();
  if (currentUser.role !== 'admin' && post.authorId !== currentUser.id) return;
  await deleteDoc(postRef);
  const commentsQuery = query(collection(db, "comments"), where("postId", "==", postId));
  const commentsSnap = await getDocs(commentsQuery);
  commentsSnap.forEach(doc => deleteDoc(doc.ref));
  const likesQuery = query(collection(db, "likes"), where("postId", "==", postId));
  const likesSnap = await getDocs(likesQuery);
  likesSnap.forEach(doc => deleteDoc(doc.ref));
  toast('Post removido.');
}

async function editPost(postId, newContent, newImg, newHidden) {
  const postRef = doc(db, "posts", postId);
  const postSnap = await getDoc(postRef);
  if (!postSnap.exists()) return;
  const post = postSnap.data();
  if (currentUser.role !== 'admin' && post.authorId !== currentUser.id) return;
  const updates = { edited: true };
  if (newContent !== undefined && newContent !== '') updates.content = newContent;
  if (newImg !== undefined) updates.imageUrl = newImg;
  if (newHidden !== undefined) updates.hiddenContent = newHidden || null;
  await updateDoc(postRef, updates);
  closeModal();
  toast('Post editado.');
}

async function toggleLike(postId) {
  if (!currentUser) return;
  const likeId = `${currentUser.id}_${postId}`;
  const likeRef = doc(db, "likes", likeId);
  const likeSnap = await getDoc(likeRef);
  if (likeSnap.exists()) {
    await deleteDoc(likeRef);
  } else {
    await setDoc(likeRef, { userId: currentUser.id, postId, timestamp: serverTimestamp() });
    const postSnap = await getDoc(doc(db, "posts", postId));
    if (postSnap.exists() && postSnap.data().authorId !== currentUser.id) {
      await addDoc(collection(db, "notifications"), {
        userId: postSnap.data().authorId,
        type: 'like',
        fromUserId: currentUser.id,
        postId,
        read: false,
        timestamp: serverTimestamp()
      });
    }
  }
}

async function addComment(postId, text) {
  if (!currentUser || !text.trim()) return;
  await addDoc(collection(db, "comments"), {
    postId,
    authorId: currentUser.id,
    content: text.trim(),
    timestamp: serverTimestamp()
  });
  const postSnap = await getDoc(doc(db, "posts", postId));
  if (postSnap.exists() && postSnap.data().authorId !== currentUser.id) {
    await addDoc(collection(db, "notifications"), {
      userId: postSnap.data().authorId,
      type: 'comment',
      fromUserId: currentUser.id,
      postId,
      read: false,
      timestamp: serverTimestamp()
    });
  }
}

// ==================== USUÁRIOS ====================
async function followUser(targetId) {
  if (!currentUser || currentUser.id === targetId) return;
  const userRef = doc(db, "users", currentUser.id);
  const targetRef = doc(db, "users", targetId);
  const isFollowing = currentUser.following?.includes(targetId);
  if (isFollowing) {
    await updateDoc(userRef, { following: arrayRemove(targetId) });
    await updateDoc(targetRef, { followers: arrayRemove(currentUser.id) });
    currentUser.following = currentUser.following.filter(id => id !== targetId);
    toast('Deixou de seguir.');
  } else {
    await updateDoc(userRef, { following: arrayUnion(targetId) });
    await updateDoc(targetRef, { followers: arrayUnion(currentUser.id) });
    currentUser.following = [...(currentUser.following || []), targetId];
    toast('Seguindo!');
  }
  sessionStorage.setItem('bubble_cu', JSON.stringify(currentUser));
  render();
}

async function updateProfile(bio, avatar) {
  const userRef = doc(db, "users", currentUser.id);
  await updateDoc(userRef, { bio, avatar });
  currentUser.bio = bio;
  currentUser.avatar = avatar;
  sessionStorage.setItem('bubble_cu', JSON.stringify(currentUser));
  toast('Perfil atualizado!');
  closeModal();
  render();
}

// ==================== MENSAGENS ====================
async function sendMessage(receiverId, content) {
  if (!currentUser || !content.trim()) return;
  const q = query(collection(db, "conversations"), where("participants", "array-contains", currentUser.id));
  const snap = await getDocs(q);
  let convId = null;
  snap.forEach(doc => {
    const data = doc.data();
    if (data.participants.includes(receiverId)) convId = doc.id;
  });
  if (!convId) {
    const convRef = await addDoc(collection(db, "conversations"), {
      participants: [currentUser.id, receiverId],
      lastUpdated: serverTimestamp()
    });
    convId = convRef.id;
  }
  await addDoc(collection(db, "messages"), {
    conversationId: convId,
    senderId: currentUser.id,
    content: content.trim(),
    timestamp: serverTimestamp()
  });
  await updateDoc(doc(db, "conversations", convId), { lastUpdated: serverTimestamp() });
  if (activeConvId === convId) {
    renderChatMessages(convId);
  }
}

async function startConvWithUser(targetId) {
  const q = query(collection(db, "conversations"), where("participants", "array-contains", currentUser.id));
  const snap = await getDocs(q);
  let convId = null;
  snap.forEach(doc => {
    const data = doc.data();
    if (data.participants.includes(targetId)) convId = doc.id;
  });
  if (!convId) {
    const convRef = await addDoc(collection(db, "conversations"), {
      participants: [currentUser.id, targetId],
      lastUpdated: serverTimestamp()
    });
    convId = convRef.id;
  }
  activeConvId = convId;
  currentView = 'messages';
  render();
}

// ==================== ADMIN ====================
async function createNPC(username, email, password, bio) {
  if (currentUser?.role !== 'admin' || !username || !email || !password) return false;
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;
    const npcData = {
      username, email, bio: bio || 'NPC do sistema.', avatar: '🧬',
      role: 'user', isNPC: true, followers: [], following: [], createdAt: serverTimestamp()
    };
    await setDoc(doc(db, "users", uid), npcData);
    toast(`NPC ${username} criado!`);
    return true;
  } catch (e) { toast('Erro ao criar NPC'); return false; }
}

async function createSystemPost(content) {
  if (currentUser?.role !== 'admin' || !content) return;
  await addDoc(collection(db, "posts"), {
    authorId: currentUser.id,
    content: `⚡ SISTEMA: ${content}`,
    imageUrl: '',
    timestamp: serverTimestamp(),
    visibility: 'public',
    hiddenContent: null,
    isEvent: true,
    edited: false
  });
  toast('Evento do sistema transmitido!');
}

async function adminEditPost(postId, newContent, newImg, newTimestamp, newHidden) {
  if (currentUser?.role !== 'admin') return false;
  const postRef = doc(db, "posts", postId);
  const updates = { edited: true };
  if (newContent) updates.content = newContent;
  if (newImg !== undefined) updates.imageUrl = newImg;
  if (newHidden !== undefined) updates.hiddenContent = newHidden || null;
  if (newTimestamp) {
    let ts;
    if (newTimestamp === 'agora') ts = serverTimestamp();
    else if (newTimestamp.startsWith('há')) {
      const mins = parseInt(newTimestamp.replace(/\D/g,'')) || 0;
      ts = new Date(Date.now() - mins * 60000);
    } else ts = new Date(newTimestamp);
    updates.timestamp = Timestamp.fromDate(ts);
  }
  await updateDoc(postRef, updates);
  toast('Post editado pelo admin!');
  return true;
}

// ==================== RENDERIZAÇÃO ====================
function render() {
  const appDiv = document.getElementById('app');
  if (!currentUser) {
    appDiv.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }
  appDiv.innerHTML = renderHeader() + renderMain() + renderBottomNav();
  attachMainEvents();
  if (currentView === 'feed') setupFeedListener();
  else if (feedUnsubscribe) feedUnsubscribe();
}

function renderHeader() {
  return `<div class="header">
    <div class="logo">Bubble</div>
    <div class="header-right">
      <button class="icon-btn" id="hdr-notif"><i class="far fa-bell"></i><span class="badge" id="notifBadge">0</span></button>
      <button class="icon-btn" id="hdr-msg"><i class="far fa-paper-plane"></i></button>
    </div>
  </div>`;
}

function renderBottomNav() {
  return `<div class="bottom-nav">
    <button class="nav-btn ${currentView === 'feed' ? 'active' : ''}" data-nav="feed"><i class="fas fa-home"></i></button>
    <button class="nav-btn ${currentView === 'search' ? 'active' : ''}" data-nav="search"><i class="fas fa-search"></i></button>
    <button class="nav-btn ${currentView === 'trending' ? 'active' : ''}" data-nav="trending"><i class="fas fa-fire"></i></button>
    <button class="nav-btn" id="nav-newpost"><i class="fas fa-plus-circle"></i></button>
    <button class="nav-btn ${currentView === 'profile' ? 'active' : ''}" data-nav="profile"><i class="fas fa-user"></i></button>
    ${currentUser.role === 'admin' ? `<button class="nav-btn skull ${currentView === 'admin' ? 'active' : ''}" data-nav="admin"><i class="fas fa-skull"></i></button>` : ''}
  </div>`;
}

function renderMain() {
  switch (currentView) {
    case 'feed': return `<div class="feed-posts"></div>`;
    case 'search': return renderSearch();
    case 'trending': return renderTrending();
    case 'notifications': return renderNotifications();
    case 'messages': return renderMessages();
    case 'profile': return renderProfile(profileViewId || currentUser.id);
    case 'admin': return currentUser.role === 'admin' ? renderAdmin() : '<div></div>';
    default: return '<div></div>';
  }
}

// Feed com listener
function setupFeedListener() {
  if (feedUnsubscribe) feedUnsubscribe();
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  feedUnsubscribe = onSnapshot(q, async (snapshot) => {
    const posts = [];
    snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
    // Recarregar cache de usuários para nomes/avatares
    const usersSnap = await getDocs(collection(db, "users"));
    usersSnap.forEach(d => { userCache[d.id] = d.data(); });
    renderFeed(posts);
  });
}

function renderFeed(postsArray) {
  const feedContainer = document.querySelector('.feed-posts');
  if (!feedContainer) return;
  const visible = postsArray.filter(p =>
    p.visibility === 'public' ||
    (p.visibility === 'private' && p.authorId === currentUser.id) ||
    (p.visibility === 'specific' && (p.authorId === currentUser.id || currentUser.role === 'admin'))
  );
  if (visible.length) {
    feedContainer.innerHTML = visible.map(post => renderPostHtml(post)).join('');
  } else {
    feedContainer.innerHTML = `<div class="empty-state"><i class="fas fa-satellite-dish"></i><p>Nenhum sinal detectado.<br>Seja o primeiro a transmitir.</p></div>`;
  }
  attachPostEvents();
}

function renderPostHtml(post) {
  const author = getUserData(post.authorId);
  const isEvent = post.isEvent;
  const canEdit = currentUser.role === 'admin' || post.authorId === currentUser.id;
  const avatarContent = author.avatar || author.username[0];
  const imageHtml = post.imageUrl ? `<div class="post-image"><img src="${optimizeCloudinaryUrl(post.imageUrl, 600)}" loading="lazy" onerror="this.src='https://picsum.photos/400/300'"></div>` : `<div class="post-no-image">${colorHashtags(post.content)}</div>`;
  const captionHtml = post.imageUrl ? `<div class="post-body"><span class="caption"><span class="uname">${esc(author.username)}</span>${colorHashtags(post.content)}</span></div>` : '';
  const hiddenHtml = post.hiddenContent ? `<div class="post-body"><span class="hidden-hint" data-reveal="${post.id}">🔮 Conteúdo oculto — clique para revelar</span></div>` : '';

  return `<div class="post ${isEvent ? 'event-post' : ''}" data-post-id="${post.id}" style="position:relative;">
    ${isEvent ? '<div class="event-alert"><i class="fas fa-bolt"></i> EVENTO DO SISTEMA</div>' : ''}
    <div class="post-header">
      <div class="avatar ${author.isNPC ? 'npc-ring' : ''} ${author.role === 'admin' ? 'admin-ring' : ''}" data-view-profile="${post.authorId}">${avatarContent}</div>
      <div class="post-meta">
        <div class="post-author">
          <span data-view-profile="${post.authorId}" style="cursor:pointer;">${esc(author.username)}</span>
          ${author.isNPC ? '<span class="badge-tag badge-npc">NPC</span>' : ''}
          ${author.role === 'admin' ? '<span class="badge-tag badge-admin">GM</span>' : ''}
          ${post.visibility !== 'public' ? '<span class="badge-tag badge-sys">PRIV</span>' : ''}
          ${post.edited ? '<span class="edited-tag">editado</span>' : ''}
        </div>
        <div class="post-time">${timeAgo(post.timestamp)}</div>
      </div>
      ${canEdit ? `<button class="post-options-btn" data-options="${post.id}"><i class="fas fa-ellipsis-h"></i></button>` : ''}
    </div>
    ${imageHtml}
    <div class="post-actions">
      <button class="act-btn like-btn" data-post="${post.id}">
        <i class="far fa-heart"></i>
        <span class="act-count like-count" data-post="${post.id}">0</span>
      </button>
      <button class="act-btn" data-toggle-comments="${post.id}">
        <i class="far fa-comment"></i>
        <span class="act-count">0</span>
      </button>
      <button class="act-btn" data-share="${post.id}" style="margin-left:auto;">
        <i class="far fa-paper-plane"></i>
      </button>
    </div>
    ${captionHtml}
    ${hiddenHtml}
    <div class="comments-section" id="cmts-${post.id}"></div>
    <div class="add-comment-row">
      <input class="comment-input-field" data-post="${post.id}" placeholder="Adicione um comentário..." />
      <button class="post-comment-btn" data-post="${post.id}">Publicar</button>
    </div>
  </div>`;
}

// ==================== MODAIS COM CLOUDINARY ====================
let selectedVis = 'public';
let uploadedImageUrl = '';

function showNewPostModal() {
  selectedVis = 'public';
  uploadedImageUrl = '';
  const html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">+ Novo Post</div>
      <textarea class="modal-textarea" id="newPostContent" placeholder="O que está acontecendo na rede?..."></textarea>
      <button type="button" id="uploadImageBtn" class="btn-ghost" style="margin: 8px 0;">📸 Adicionar imagem</button>
      <div id="imagePreview" style="margin: 8px 0; display: none;">
        <img id="previewImg" style="max-width:100%; max-height:150px; border-radius:8px;">
      </div>
      <div class="visibility-row">
        <button class="vis-btn selected" data-vis="public">🌐 Público</button>
        <button class="vis-btn" data-vis="private">🔒 Privado</button>
        <button class="vis-btn" data-vis="specific">👁️ Restrito</button>
      </div>
      <input class="modal-input" id="newPostHidden" placeholder="Conteúdo oculto ARG (opcional)">
      <div class="modal-actions">
        <button class="modal-cancel" id="cancelPost">Cancelar</button>
        <button class="modal-publish" id="confirmPost">Publicar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('cancelPost').onclick = closeModal;
  document.getElementById('confirmPost').onclick = () => {
    const content = document.getElementById('newPostContent').value;
    const hidden = document.getElementById('newPostHidden').value;
    createPost(content, uploadedImageUrl, selectedVis, hidden);
  };
  const uploadBtn = document.getElementById('uploadImageBtn');
  uploadBtn.onclick = () => {
    const widget = cloudinary.createUploadWidget(
      { cloudName: 'dd2mltlsb', uploadPreset: 'bubble_uploads', sources: ['local', 'camera', 'url'], multiple: false, cropping: true, clientAllowedFormats: ['jpg','png','webp','gif'] },
      (error, result) => {
        if (!error && result && result.event === 'success') {
          uploadedImageUrl = result.info.secure_url;
          const preview = document.getElementById('imagePreview');
          const img = document.getElementById('previewImg');
          img.src = uploadedImageUrl;
          preview.style.display = 'block';
          uploadBtn.textContent = '🔄 Trocar imagem';
        }
      }
    );
    widget.open();
  };
  document.querySelectorAll('.vis-btn').forEach(btn => {
    btn.onclick = () => {
      selectedVis = btn.dataset.vis;
      document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });
  document.getElementById('modalOverlay').onclick = e => { if (e.target.id === 'modalOverlay') closeModal(); };
}

function showEditPostModal(pid) {
  // Buscar post do Firestore (simplificado – você pode passar os dados atuais)
  getDoc(doc(db, "posts", pid)).then(postSnap => {
    if (!postSnap.exists()) return;
    const post = { id: postSnap.id, ...postSnap.data() };
    let newImageUrl = post.imageUrl || '';
    const html = `<div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <div class="modal-title">Editar Post</div>
        <textarea class="modal-textarea" id="editPostContentModal">${esc(post.content)}</textarea>
        <button type="button" id="editUploadImageBtn" class="btn-ghost" style="margin: 8px 0;">📸 Trocar imagem</button>
        <div id="editImagePreview" style="margin: 8px 0; ${post.imageUrl ? '' : 'display:none;'}">
          <img id="editPreviewImg" src="${post.imageUrl || ''}" style="max-width:100%; max-height:150px; border-radius:8px;">
        </div>
        <input class="modal-input" id="editPostHiddenModal" placeholder="Conteúdo oculto ARG" value="${esc(post.hiddenContent || '')}">
        <div class="modal-actions">
          <button class="modal-cancel" id="cancelEdit">Cancelar</button>
          <button class="modal-publish" id="confirmEdit">Salvar</button>
        </div>
      </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', html);
    document.getElementById('cancelEdit').onclick = closeModal;
    document.getElementById('confirmEdit').onclick = () => {
      const newContent = document.getElementById('editPostContentModal').value;
      const newHidden = document.getElementById('editPostHiddenModal').value;
      editPost(pid, newContent, newImageUrl, newHidden);
    };
    const editUploadBtn = document.getElementById('editUploadImageBtn');
    editUploadBtn.onclick = () => {
      const widget = cloudinary.createUploadWidget(
        { cloudName: 'dd2mltlsb', uploadPreset: 'bubble_uploads', sources: ['local', 'camera', 'url'], multiple: false, cropping: true },
        (error, result) => {
          if (!error && result && result.event === 'success') {
            newImageUrl = result.info.secure_url;
            const preview = document.getElementById('editImagePreview');
            const img = document.getElementById('editPreviewImg');
            img.src = newImageUrl;
            preview.style.display = 'block';
            editUploadBtn.textContent = '🔄 Trocar imagem';
          }
        }
      );
      widget.open();
    };
    document.getElementById('modalOverlay').onclick = e => { if (e.target.id === 'modalOverlay') closeModal(); };
  });
}

function showEditProfileModal() {
  const html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title">Editar Perfil</div>
      <input class="modal-input" id="editBio" placeholder="Bio" value="${esc(currentUser.bio || '')}">
      <div class="modal-input" style="padding:10px 12px;margin-top:8px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:Space Mono,monospace;">Avatar</div>
        <div class="avatar-picker">${AVATARS.map(a => `<div class="av-opt ${currentUser.avatar === a ? 'selected' : ''}" data-av="${a}">${a}</div>`).join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="cancelEditProfile">Cancelar</button>
        <button class="modal-publish" id="confirmEditProfile">Salvar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  let selectedAv = currentUser.avatar || '✨';
  document.querySelectorAll('.av-opt').forEach(btn => {
    btn.onclick = () => {
      selectedAv = btn.dataset.av;
      document.querySelectorAll('.av-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });
  document.getElementById('cancelEditProfile').onclick = closeModal;
  document.getElementById('confirmEditProfile').onclick = () => {
    const bio = document.getElementById('editBio').value;
    updateProfile(bio, selectedAv);
  };
  document.getElementById('modalOverlay').onclick = e => { if (e.target.id === 'modalOverlay') closeModal(); };
}

function closeModal() { document.getElementById('modalOverlay')?.remove(); }

// ==================== EVENTOS ====================
function attachMainEvents() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => { currentView = btn.dataset.nav; profileViewId = null; if (currentView !== 'messages') activeConvId = null; openOptionsPostId = null; render(); });
  });
  document.getElementById('nav-newpost')?.addEventListener('click', showNewPostModal);
  document.getElementById('hdr-notif')?.addEventListener('click', () => { currentView = 'notifications'; render(); });
  document.getElementById('hdr-msg')?.addEventListener('click', () => { currentView = 'messages'; render(); });
  // ... outros eventos (like, comment, etc.) podem ser adicionados conforme necessidade
}

function attachLoginEvents() {
  document.getElementById('loginBtn')?.addEventListener('click', async () => {
    const email = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if (!await login(email, pass)) {
      document.getElementById('loginError').textContent = 'Email ou senha incorretos.';
      document.getElementById('loginError').style.display = 'block';
    }
  });
  document.getElementById('regBtn')?.addEventListener('click', async () => {
    const user = document.getElementById('regUser').value;
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    const res = await register(user, email, pass);
    if (res === 'exists') {
      document.getElementById('regError').textContent = 'Username ou email já existe.';
      document.getElementById('regError').style.display = 'block';
    } else if (res === 'fill') {
      document.getElementById('regError').textContent = 'Preencha todos os campos.';
      document.getElementById('regError').style.display = 'block';
    }
  });
}

// ==================== INICIALIZAÇÃO ====================
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      currentUser = { id: user.uid, ...userDoc.data() };
    } else {
      const newUser = { username: user.email.split('@')[0], email: user.email, bio: '', avatar: '✨', role: 'user', isNPC: false, followers: [], following: [], createdAt: serverTimestamp() };
      await setDoc(doc(db, "users", user.uid), newUser);
      currentUser = { id: user.uid, ...newUser };
    }
    sessionStorage.setItem('bubble_cu', JSON.stringify(currentUser));
    // Carregar cache de usuários
    const usersSnap = await getDocs(collection(db, "users"));
    usersSnap.forEach(d => { userCache[d.id] = d.data(); });
    render();
  } else {
    currentUser = null;
    sessionStorage.removeItem('bubble_cu');
    render();
  }
});

// Inicialização
render();
